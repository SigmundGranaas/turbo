[package]
name = "place-core"
version = "0.1.0"
edition = "2021"
description = "Shared, pure ranking/classification core for Turbo search + reverse-geocoding. Bound into Dart (flutter_rust_bridge), Kotlin/Swift (UniFFI) and .NET (P/Invoke)."
license = "MIT"

[lib]
name = "place_core"
# `cdylib` for the UniFFI shared library; `lib` so the integration tests and the
# server's P/Invoke path keep linking it as a normal Rust crate.
crate-type = ["lib", "cdylib"]

[features]
# UniFFI bindings (Kotlin / Swift / Python) live behind a feature so the pure
# logic + golden tests stay toolchain-free. Build with `--features uniffi`.
uniffi = ["dep:uniffi"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uniffi = { version = "0.28", features = ["cli"], optional = true }

# The UniFFI binding generator, compiled only when the feature is on.
[[bin]]
name = "uniffi-bindgen"
required-features = ["uniffi"]
