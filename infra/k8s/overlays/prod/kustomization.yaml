apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ingress.yaml

patches:
  - path: app-config-patch.yaml
  - path: application-patch.yaml

# Copy the domain value out of app-config.data.Domain__ApiHost into
# Ingress.spec.rules[0].host so the single ConfigMap edit in
# app-config-patch.yaml also moves the ingress. Whatever value the
# ingress.yaml file holds is overwritten at render time.
replacements:
  - source:
      kind: ConfigMap
      name: app-config
      fieldPath: data.Domain__ApiHost
    targets:
      - select:
          kind: Ingress
          name: turboapi-ingress
        fieldPaths:
          - spec.rules.0.host

labels:
  - pairs:
      environment: production
      managed-by: argocd
    includeSelectors: true

replicas:
  - name: turboapi-modulith
    count: 1

# Argo CD Image Updater rewrites newTag below each time a new image is
# pushed to ghcr.io. See infra/argocd/application.yaml for the
# update-strategy + write-back annotations.
images:
  - name: ghcr.io/sigmundgranaas/turboapi-modulith
    newName: ghcr.io/sigmundgranaas/turboapi-modulith
    newTag: latest
