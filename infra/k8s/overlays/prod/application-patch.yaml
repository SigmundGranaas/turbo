# Prod patch for turboapi-modulith. Every value here is either an
# auth-stack secret or a configMapKeyRef into app-config (see
# app-config-patch.yaml). Nothing is hardcoded — the patch is fully
# domain-agnostic; switching domains means editing app-config-patch.yaml
# only.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: turboapi-modulith
spec:
  template:
    spec:
      containers:
        - name: turboapi-modulith
          env:
            - name: Jwt__Key
              valueFrom: { secretKeyRef: { name: auth-secrets, key: jwt-key } }
            - name: Jwt__Issuer
              valueFrom: { configMapKeyRef: { name: app-config, key: Jwt__Issuer } }
            - name: Jwt__Audience
              valueFrom: { configMapKeyRef: { name: app-config, key: Jwt__Audience } }
            - name: Jwt__TokenExpirationMinutes
              valueFrom: { configMapKeyRef: { name: app-config, key: Jwt__TokenExpirationMinutes } }
            - name: Jwt__RefreshTokenExpirationDays
              valueFrom: { configMapKeyRef: { name: app-config, key: Jwt__RefreshTokenExpirationDays } }

            - name: AllowedOrigins
              valueFrom: { configMapKeyRef: { name: app-config, key: CORS__AllowedOrigins } }

            - name: Authentication__Google__ClientId
              valueFrom: { secretKeyRef: { name: auth-secrets, key: google-client-id } }
            - name: Authentication__Google__ClientSecret
              valueFrom: { secretKeyRef: { name: auth-secrets, key: google-client-secret } }
            - name: Authentication__Google__RedirectUri
              valueFrom: { configMapKeyRef: { name: app-config, key: Authentication__Google__RedirectUri } }

            - name: FrontendUrl
              valueFrom: { configMapKeyRef: { name: app-config, key: FrontendUrl } }
            - name: COOKIE_DOMAIN
              valueFrom: { configMapKeyRef: { name: app-config, key: COOKIE_DOMAIN } }
            - name: COOKIE_SAME_SITE
              valueFrom: { configMapKeyRef: { name: app-config, key: COOKIE_SAME_SITE } }
            - name: COOKIE_SECURE
              valueFrom: { configMapKeyRef: { name: app-config, key: COOKIE_SECURE } }
            - name: COOKIE_EXPIRY_DAYS
              valueFrom: { configMapKeyRef: { name: app-config, key: COOKIE_EXPIRY_DAYS } }
            - name: COOKIE_PATH
              valueFrom: { configMapKeyRef: { name: app-config, key: COOKIE_PATH } }
