# NB: spec.rules[0].host is rewritten at kustomize render time by the
# `replacements:` block in kustomization.yaml, which copies
# app-config.data.Domain__ApiHost into this field. The literal here is
# only a fallback so the file is still valid as a standalone manifest.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: turboapi-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: REPLACED_BY_KUSTOMIZE
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: turboapi-modulith
                port:
                  number: 80
