# All API traffic on kart-api.sandring.no fans into the single modulith
# host. The modulith owns every route (/api/auth/*, /api/geo/*,
# /api/tracks/*, /api/collections/*, /api/activities/*) directly — no
# gateway, no per-module backend.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: turboapi-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: kart-api.sandring.no
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: turboapi-modulith
                port:
                  number: 80
