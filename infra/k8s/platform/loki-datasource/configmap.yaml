# Grafana datasource for Loki. The kube-prometheus-stack Grafana sidecar
# auto-loads ConfigMaps labelled grafana_datasource in the observability ns.
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-grafana-datasource
  namespace: observability
  labels:
    grafana_datasource: "1"
data:
  loki-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki-gateway.observability.svc
        isDefault: false
        jsonData:
          maxLines: 1000
