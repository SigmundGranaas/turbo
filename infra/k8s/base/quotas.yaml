# Namespace guardrails so a runaway pod can't starve the single node, and
# every pod gets sane defaults. Sized for the ~6Gi / 12-CPU node with the
# DB + observability sharing it.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: turbo-prod
spec:
  hard:
    requests.cpu: "3"
    requests.memory: 4Gi
    limits.cpu: "8"
    # 8Gi, not 6Gi: the steady services commit ~5.5Gi of *limits*, leaving no
    # room for the weekly turbo-places-ingest pod (2Gi limit) — its job kept
    # failing as "exceeded quota" until its deadline, so the places DB never
    # filled. Limits overcommit the 5.7Gi node, but that's safe: scheduling is by
    # requests (all pods request ~1.5Gi total + ingest 512Mi) and actual usage is
    # ~2.6Gi, so the bounded-batch ingest has real RAM to run in.
    limits.memory: 8Gi
    pods: "30"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: turbo-prod-defaults
spec:
  limits:
    - type: Container
      default:                # applied if a container omits limits
        cpu: "500m"
        memory: 256Mi
      defaultRequest:         # applied if a container omits requests
        cpu: "50m"
        memory: 64Mi
