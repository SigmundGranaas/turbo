apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace-agnostic base for the Turbo modulith. Each environment overlay
# (envs/<env>) sets the namespace, image tag, host and replica count.
resources:
  - config.yaml
  - db.yaml          # CNPG-managed Postgres (turbo-db) — primary datastore
  - modulith.yaml
  - web.yaml
  - ingress.yaml
  - pdb.yaml
  - hpa.yaml
  - quotas.yaml
  # ── Routing (tileserver) — FLIP TO DEPLOY ────────────────────────────
  # Uncomment BOTH lines to ship the routing API. Do the prereqs first
  # (see README-tileserver.md): push artifacts to R2, seal tiles-db-app +
  # tiles-db-secrets, add the image + those secrets in
  # envs/prod/kustomization.yaml, confirm node capacity. The image is
  # published by .github/workflows/tileserver_build.yml.
  # - tiles-db.yaml      # CNPG Postgres (PostGIS) for the tiles DB
  # - tileserver.yaml    # tileserver Deployment/Service/Ingress + artifacts PVC

labels:
  - pairs:
      app.kubernetes.io/part-of: turbo
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: true
