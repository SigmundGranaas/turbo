apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace-agnostic base for the Turbo modulith. Each environment overlay
# (envs/<env>) sets the namespace, image tag, host and replica count.
resources:
  - config.yaml
  - db.yaml          # CNPG-managed Postgres (turbo-db) — primary datastore
  - modulith.yaml
  - places.yaml         # turbo-places: standalone search + reverse-geocoding service
  - places-ingest.yaml  # CronJob: the sole writer of the Places (SSR) dataset
  - web.yaml
  - ingress.yaml
  - pdb.yaml
  - hpa.yaml
  - quotas.yaml
  # ── Routing (tileserver) — LIVE ──────────────────────────────────────
  - tiles-db.yaml      # CNPG Postgres (PostGIS) for the tiles DB
  - tileserver.yaml    # tileserver Deployment/Service/Ingress + artifacts PVC

labels:
  - pairs:
      app.kubernetes.io/part-of: turbo
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: true
