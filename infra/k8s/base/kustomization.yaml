apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace-agnostic base for the Turbo modulith. Each environment overlay
# (envs/<env>) sets the namespace, image tag, host and replica count.
resources:
  - config.yaml
  - db.yaml          # CNPG-managed Postgres (turbo-db) — primary datastore
  - modulith.yaml
  - places.yaml         # turbo-places: standalone search + reverse-geocoding service
  - places-ingest.yaml  # CronJob: the sole writer of the Places (SSR) dataset
  - web.yaml
  - ingress.yaml
  - pdb.yaml
  - hpa.yaml
  - quotas.yaml
  # ── Routing (tileserver) — LIVE ──────────────────────────────────────
  - tiles-db.yaml      # CNPG Postgres (PostGIS) for the tiles DB
  - tileserver.yaml    # tileserver Deployment/Service/Ingress + artifacts PVC
  - tileserver-ingest.yaml  # CronJob: scheduled N50 re-provision (suspended until cutover)

# Shared ingestion source catalog → ConfigMap, mounted read-only into the
# tileserver, its ingest CronJob, and the places ingest CronJob at
# /etc/turbo/ingest/catalog.toml. Stable name (no hash) so the volume ref is
# simple; consumers read it at startup with a fallback to compiled-in defaults.
configMapGenerator:
  - name: ingest-catalog
    files:
      - ingest/catalog.toml
generatorOptions:
  disableNameSuffixHash: true

labels:
  - pairs:
      app.kubernetes.io/part-of: turbo
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: true
