# Auth service with lightweight db check and migration init containers
apiVersion: apps/v1
kind: Deployment
metadata:
  name: turboapi-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: turboapi-auth
  template:
    metadata:
      labels:
        app: turboapi-auth
    spec:
      # No init containers. The Auth host creates its database (if missing)
      # and runs EF Core migrations at startup via
      # MigrateModuleDatabaseAsync — concurrent replicas serialise on the
      # __EFMigrationsHistory row lock.
      containers:
        - name: turboapi-auth
          image: turboapi-auth:latest
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: ASPNETCORE_ENVIRONMENT
            - name: ConnectionStrings__Auth
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: connectionstring-auth
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4317"
            - name: OTEL_SERVICE_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: OTEL_SERVICE_NAME_AUTH
            - name: Nats__Url
              value: "nats://nats:4222"
---
# Geo service with lightweight db check and migration init containers
apiVersion: apps/v1
kind: Deployment
metadata:
  name: turboapi-geo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: turboapi-geo
  template:
    metadata:
      labels:
        app: turboapi-geo
    spec:
      # No init containers — Geo migrates at startup. The PostGIS extension
      # is created by an EF Core migration step in the InitialCreate.
      containers:
        - name: turboapi-geo
          image: turboapi-geo:latest
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: ASPNETCORE_ENVIRONMENT
            - name: ConnectionStrings__Geo
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: connectionstring-geo
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4317"
            - name: OTEL_SERVICE_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: OTEL_SERVICE_NAME_GEO
            - name: Nats__Url
              value: "nats://nats:4222"
