# Turbo tileserver (Rust) — full basemap + routing deployment.
#
# Serves the self-hosted N50 basemap (vector MVT + style + glyphs + sprites +
# raster fallback + DEM/hillshade/slope) AND the routing API, in FULL mode
# (connected to the tiles Postgres). Self-provisions N50 from Geonorge at
# boot (TILESERVER_PROVISION_ON_BOOT) and refreshes daily, so a fresh deploy
# populates itself. See docs/architecture/2026-06-deploy-runbook.md for the
# full sequence and infra/k8s/README-tileserver.md for artifact staging.
#
# Prerequisites (runbook §2): tiles-db secrets sealed; `norway.dem` staged on
# the hostPath PV (else /v1/dem,/v1/slope,raster-hillshade are 503 — vector
# basemap still works); egress to *.geonorge.no permitted; the Cloudflare
# Worker (infra/edge/tiles-worker) deployed at PUBLIC_BASE_URL's host.
#
# Exposure: Traefik ingress targets this Service directly. The public tile
# surface (/v1/basemap,/v1/raster,/v1/dem,/v1/slope,/fonts,/sprite,/v1/route,
# curated /v1/{resource}) is routed natively; the legacy /api/route -> /v1/route
# ReplacePathRegex is kept for back-compat. /admin and /v1/debug are NOT
# exposed publicly.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tileserver-artifacts
  labels:
    app: tileserver
spec:
  accessModes: ["ReadWriteOnce"]
  # Statically bound to the pre-staged hostPath PV
  # (envs/prod/tileserver-artifacts-pv.yaml). Empty class disables dynamic
  # provisioning — the artifacts are rsync'd onto the node ahead of deploy
  # (see README-tileserver.md), not pulled at boot.
  storageClassName: ""
  resources:
    requests:
      # Routing artifacts ≈ 14Gi today (norway.dem 11Gi + mask/graph/
      # graph_geom/vectors/anchors). 20Gi leaves headroom for a rebuild.
      storage: 20Gi
---
# Path rewrite: public /api/route/<x>  ->  tileserver /v1/route/<x>.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: tileserver-route-rewrite
spec:
  replacePathRegex:
    regex: "^/api/route/(.*)"
    replacement: "/v1/route/$1"
---
# Tile namespace: public /tiles/<x>  ->  tileserver /<x>. PUBLIC_BASE_URL points
# clients at kart-api.sandring.no/tiles/…, so every self-referenced tile asset
# (style.json, sprite, glyphs, /v1/basemap, /v1/dem, curated MVT) is reachable
# under one cache-friendly prefix. This strips the prefix so the tileserver,
# which serves at the root (/v1, /fonts, /sprite), sees the unprefixed path.
# Routing (/api/route) deliberately stays OUTSIDE /tiles — it isn't a cacheable
# tile asset.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: tileserver-tiles-strip
spec:
  stripPrefix:
    prefixes:
      - /tiles
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tileserver
  labels:
    app: tileserver
spec:
  replicas: 1
  strategy:
    type: Recreate          # single RWO artifact volume — no two pods mounting it
  selector:
    matchLabels:
      app: tileserver
  template:
    metadata:
      labels:
        app: tileserver
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532      # chiseled/distroless nonroot
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ghcr-auth
      # No artifact-seed init container: the artifacts are pre-staged on the
      # node at /mnt/tiles-artifacts (rsync'd from your machine over the
      # LAN) and exposed read-only via the hostPath PV. The container just
      # mmaps them at boot — nothing to download. See README-tileserver.md.
      containers:
        - name: tileserver
          image: turbo-tileserver       # registry/tag set per-env via kustomize images:
          # Full mode (no --no-db): connects to the tiles Postgres and
          # runs migrations at boot. Serves routing + curated MVT.
          args: ["serve", "--artifacts-dir", "/artifacts"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          ports:
            - containerPort: 8080
          env:
            - name: RUST_LOG
              value: "info,tower_http=warn,sqlx=warn"
            - name: TILESERVER_ARTIFACT_DIR
              value: "/artifacts"
            # Shared ingestion catalog (N50 metadata UUID); read at startup with
            # a fallback to the compiled-in default if the mount is absent.
            - name: INGEST_CATALOG_PATH
              value: "/etc/turbo/ingest/catalog.toml"
            # Migrations build the DB graph-routing / tile schema. They
            # CREATE EXTENSION IF NOT EXISTS {postgis,pgrouting,postgis_raster,
            # pg_trgm}; the untrusted ones are pre-created by CNPG (the
            # `tiles-db-tiles` Database resource), so the IF NOT EXISTS calls
            # no-op for the unprivileged `app` role and migrations pass.
            - name: AUTO_MIGRATE
              value: "true"
            # CNPG owns the tiles-db `app` credential and publishes a
            # ready-made connection URI in its `tiles-db-app` secret
            # (`uri` key = postgresql://app:<pw>@tiles-db-rw:5432/tiles).
            # Point straight at it so the password always matches what
            # CNPG actually set — no separately-sealed secret to drift.
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: tiles-db-app, key: uri } }
            # Public origin for self-referential URLs in style.json / sprite /
            # glyphs / TileJSON. Points at the live API host under a dedicated
            # `/tiles` path prefix: the tileserver serves `/v1`,`/fonts`,`/sprite`,
            # and the `tileserver-tiles-strip` Middleware (below) strips `/tiles`
            # before forwarding, so `{BASE_URL}/v1/basemap/…` resolves to
            # `kart-api.sandring.no/tiles/v1/basemap/…` → tileserver `/v1/basemap/…`.
            # The `/tiles` prefix namespaces all cacheable tile assets under one
            # path so a future Cloudflare Cache Rule can target `/tiles/*` cleanly
            # (a dedicated edge host like tiles.* is deferred — sandring.no is the
            # owned Cloudflare zone; turkart.no was never ours).
            - name: PUBLIC_BASE_URL
              value: "https://kart-api.sandring.no/tiles"
            # Dataset-version cache-buster. style.json / TileJSON append this as
            # `?v=<tag>` on the basemap + DEM tile URLs, and the basemap tile
            # response is then served `Cache-Control: immutable` — so the CDN can
            # cache tiles forever and a rebuild just bumps this tag (new URL space,
            # old edge entries orphan, NO purge needed). BUMP THIS on every N50
            # basemap re-provision (unset = versioning off, tiles fall back to the
            # 1-day revalidating policy).
            - name: TILESERVER_DATA_VERSION
              value: "n50-2026.06"
            # --- Self-provisioning (Geonorge N50) ---------------------------
            # Where the ingest pipeline unzips/restores the downloaded
            # PostGIS dumps. Must be writable + sized (see the `incoming`
            # emptyDir below); a national dump peaks ~35-40Gi on disk.
            - name: TILESERVER_INCOMING_DIR
              value: "/var/lib/tileserver/incoming"
            # On an EMPTY tiles DB, fetch+restore the national N50 from
            # Geonorge at boot so a fresh deploy populates itself. No-op once
            # data is present (guarded on row count). Requires *.geonorge.no
            # egress. Unset/blank to disable and provision via the admin panel.
            - name: TILESERVER_PROVISION_ON_BOOT
              value: "national"
            # Scheduled re-provision is now the turbo-tileserver-ingest CronJob
            # (base/tileserver-ingest.yaml, monthly), NOT an in-process loop:
            # k8s owns the schedule + run history and the serving pod no longer
            # runs a background provisioner that could contend for the node.
            # Boot-provision above stays as the empty-DB self-heal.
            # (Retired TILESERVER_PROVISION_REFRESH_SECS=86400 at the cutover.)
            # Decompressed DEM-tile cache ceiling — the largest of the four
            # in-RAM cache tiers and the only one with no SSD byte-tier behind
            # it (a miss re-decompresses from the mmap'd DEM), so routing wants
            # it warm. It gets the lion's share of a deliberately small total
            # RAM-cache budget: the four mem tiers (this 64 + dem-rgb 8 + mvt 8
            # + raster 8) sum to 88MiB, held under a 100MB ceiling so the pod's
            # cache footprint stays tiny and predictable on this 5.7Gi node.
            # 64MiB still keeps the hot corridor warm; misses page from the SSD
            # mmap (cheap, the DEM is immutable per deploy).
            - name: TILESERVER_DEM_CACHE_BYTES
              value: "67108864"     # 64 MiB
            # Concurrent routing solves (each holds corridor + trail
            # scratch for its duration; excess requests queue). Match the
            # CPU limit rather than the node's core count.
            - name: TILESERVER_ROUTING_CONCURRENCY
              value: "2"
            # --- Rendered DEM-tile cache (write-through RAM + SSD) ----------
            # /v1/dem/rgb re-renders 66k projections + bilinear samples + PNG
            # per tile (~234ms warm) and congestion-collapses past a few
            # concurrent renders (measured p50 430ms@8 → 9.5s@64). The DTM is
            # immutable per deploy, so rendered tiles are reusable forever —
            # this caches every tile produced (RAM in front of the SSD volume
            # below), serving warm tiles in ~1ms and lifting the per-tile
            # re-render that made the endpoint fragile under load.
            - name: TILESERVER_DEM_TILE_CACHE_DIR
              value: "/var/lib/tileserver/dem-cache"
            # SSD budget. LRU-evicts the least-recently-used tiles when full —
            # keep it UNDER the dem-cache emptyDir sizeLimit (4Gi) so the app
            # cleans up before the kubelet evicts the pod on ephemeral storage.
            - name: TILESERVER_DEM_TILE_CACHE_DISK_BYTES
              value: "8589934592"   # 8 GiB — bigger rendered-tile cache so more
              # of the (immutable) DEM pyramid stays warm within a pod lifetime;
              # SSD/emptyDir, not counted against the RAM limit. Kept under the
              # dem-cache emptyDir sizeLimit (10Gi) below.
            # RAM tier — tiny hot-set buffer in front of the 3Gi SSD LRU. Part
            # of the 100MB total RAM-cache budget; misses hit the SSD at ~1ms,
            # so 8MiB here is plenty and keeps peak RSS down.
            - name: TILESERVER_DEM_TILE_CACHE_MEM_BYTES
              value: "8388608"      # 8 MiB
            # Max concurrent tile RENDERS (cache misses). Past this a miss
            # returns 429 + Retry-After (throttle) instead of piling onto the
            # CPU-bound renderer and collapsing it. Sized to the 2-core CPU
            # limit with a little overlap; cache HITS never take a permit, so a
            # warm server stays fully concurrent.
            # Raised to match the 4-core CPU limit below (~2× overlap, same ratio
            # as before). DEM renders are CPU-bound but light on RAM (~1.3 MB
            # each), so more is safe memory-wise — the limit is cores. ~Doubles
            # cold DEM throughput so near relief streams sooner + fewer 429s.
            - name: TILESERVER_DEM_RENDER_CONCURRENCY
              value: "8"
            # Max concurrent basemap/resource MVT renders (cache misses). A cold
            # coastal tile renders a slice of the national sea/landcover polygons
            # and is memory-heavy; the default (≈CPU cores = 2) let two of them
            # run at once and OOM-killed the 2Gi pod. Pin to 1 so peak render
            # memory is bounded — combined with the clip-before-simplify query
            # each render is now cheap, and cache HITS never take a permit, so a
            # warm server still serves fully concurrently.
            - name: TILESERVER_MVT_RENDER_CONCURRENCY
              value: "1"
            # Rendered-MVT cache: small RAM tier in front of a big node-local SSD
            # tier. Disk is NOT counted against the 2Gi pod memory limit, so the
            # disk budget can be large while RAM stays tiny — keeping peak RSS
            # well under the OOM ceiling. Survives container restarts (mvt-cache
            # emptyDir), so an OOM/restart doesn't re-render every coastal tile.
            - name: TILESERVER_MVT_TILE_CACHE_DIR
              value: "/var/lib/tileserver/mvt-cache"
            - name: TILESERVER_MVT_TILE_CACHE_MEM_BYTES
              value: "8388608"      # 8 MiB — hot set only (2Gi SSD tier behind it)
            - name: TILESERVER_MVT_TILE_CACHE_DISK_BYTES
              value: "2147483648"   # 2 GiB — big, the real cache
            # Rendered-RASTER (PNG) cache — same two-tier design as MVT. The
            # raster render is even heavier (rasterise + hillshade) and low-zoom
            # tiles can exceed the pool's 10s statement cap COLD, so without a
            # cache they 500 on every request and the basemap never appears below
            # ~z11. Cache the bytes (render once per data version) + give the cold
            # render a longer, render-only statement budget so it can complete.
            - name: TILESERVER_RASTER_RENDER_CONCURRENCY
              value: "1"            # one cold render at a time (memory ceiling)
            - name: TILESERVER_RASTER_RENDER_TIMEOUT_MS
              value: "45000"        # per-render SET LOCAL cap (vs the 10s default)
            - name: TILESERVER_RASTER_TILE_CACHE_DIR
              value: "/var/lib/tileserver/raster-cache"
            - name: TILESERVER_RASTER_TILE_CACHE_MEM_BYTES
              value: "8388608"      # 8 MiB — hot set only (2Gi SSD tier behind it)
            - name: TILESERVER_RASTER_TILE_CACHE_DISK_BYTES
              value: "2147483648"   # 2 GiB — big, the real cache
            # JWT_SECRET gates only the /admin + debug surface; the public
            # tiles/basemap/routing endpoints serve without it (boot no longer
            # fails when it's unset — public-only mode). We still set it here so
            # the admin panel works in prod.
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: auth-secrets, key: jwt-key } }
          startupProbe:                  # mmapping an 11Gi DEM at boot can be slow on cold cache
            httpGet: { path: /healthz, port: 8080 }
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 60
          # The on-EMPTY-db N50 boot-provision (TILESERVER_PROVISION_ON_BOOT)
          # downloads + restores the national dump — a psql restore + GiST index
          # build that pegs the 2-core limit for ~10-15 min, so /healthz answers
          # slowly (or not within a few seconds) for the whole restore. The old
          # tight probes (3s timeout × 4 failures = ~80s) SIGKILLed the pod
          # mid-restore (exit 137), which wiped the incoming download and
          # restarted the whole provision → a crash loop that never populated the
          # basemap. Tolerate the provisioning window: a long timeout + high
          # failure budget (≈20 min) so the one-time restore can finish. Once the
          # tiles-db is populated, provision is a no-op and the pod is responsive
          # again, so this generous window only matters on first/empty boot.
          # Readiness exercises the DB (/readyz does SELECT 1), so a wedged
          # connection pool — the failure mode where every tile 500s with
          # "pool timed out waiting for an open connection" — takes the pod OUT
          # of the Service endpoints (clients get a fast 503, not a 14s-then-500)
          # and it rejoins automatically once the pool recycles itself (see the
          # max_lifetime/idle_timeout in turbo-tiles-db::pool). Liveness stays on
          # the DB-FREE /healthz on purpose: a DB-dependent liveness probe would
          # SIGKILL the pod mid-restore during the CPU-pegged provisioning window
          # above → the exact crash loop we fixed. So readiness detects+sheds the
          # wedge, the pool self-heals, and liveness never false-kills on boot.
          readinessProbe:
            httpGet: { path: /readyz, port: 8080 }
            periodSeconds: 15
            timeoutSeconds: 8
            failureThreshold: 4
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 40
          resources:
            requests:
              memory: "512Mi"           # mmap pages are reclaimable; resident set is heap + hot DEM pages
              cpu: "250m"
            limits:
              # Sized for this 5.7Gi node + the namespace ResourceQuota
              # (limits.memory cap 6Gi, ~3Gi already used). The DEM is
              # mmap'd, so cold pages evict to disk (SSD) under pressure —
              # the working set is the solve corridor, not all of Norway.
              # 2Gi (was 1536Mi): the polyline-following sti trail
              # attractor (route-fidelity feature, corpus +3.4 quality
              # points) holds ~500Mi of real heap — an rtree over the
              # full Norway sti network decimated at 100 m.
              # 1536Mi (was 2Gi): measured steady RSS ~870Mi (DEM mmap is
              # evictable page cache, not heap), so 1.5Gi is ~1.7× peak — enough
              # burst for the sti rtree + solve corridors while freeing namespace
              # quota for the ingest CronJobs. Bump back if big routes get OOMKilled.
              memory: "1536Mi"
              # Raised 2→4 cores (a ceiling; requests stay 250m so scheduling is
              # unchanged). The DEM RGB render is CPU-bound (~234 ms/tile); a
              # higher ceiling + matching DEM_RENDER_CONCURRENCY (8) ~doubles cold
              # DEM tile throughput. No-op if the node has no spare cores.
              cpu: "4000m"
          volumeMounts:
            - name: artifacts
              mountPath: /artifacts
              readOnly: true
            - name: ingest-catalog
              mountPath: /etc/turbo/ingest
              readOnly: true
            - name: tmp
              mountPath: /tmp
            # Writable scratch for Geonorge downloads + unzipped PostGIS
            # dumps (readOnlyRootFilesystem is on, so this must be a real
            # volume). Matches TILESERVER_INCOMING_DIR above.
            - name: incoming
              mountPath: /var/lib/tileserver/incoming
            # Rendered DEM-tile cache. Node-local SSD (emptyDir → the node's
            # ephemeral disk, which is SSD on this box). Writable: the app
            # write-through-caches every rendered tile here and LRU-evicts when
            # its byte budget (TILESERVER_DEM_TILE_CACHE_DISK_BYTES) is reached.
            - name: dem-cache
              mountPath: /var/lib/tileserver/dem-cache
            # Rendered MVT-tile cache, node-local SSD. Small RAM LRU
            # (TILESERVER_MVT_TILE_CACHE_MEM_BYTES) in front of this big disk LRU
            # (TILESERVER_MVT_TILE_CACHE_DISK_BYTES) — keeps the pod's RAM well
            # under the 2Gi limit while caching far more tiles than RAM could, and
            # the bytes survive a container restart (e.g. an OOM-kill) so coastal
            # tiles don't all re-render cold.
            - name: mvt-cache
              mountPath: /var/lib/tileserver/mvt-cache
            # Rendered raster-PNG cache, node-local SSD — same small-RAM/big-disk
            # design as mvt-cache; disk-backed so it doesn't count against the
            # pod memory limit, and survives restarts so low-zoom tiles render
            # cold at most once per data version.
            - name: raster-cache
              mountPath: /var/lib/tileserver/raster-cache
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: tileserver-artifacts
        - name: ingest-catalog
          configMap:
            name: ingest-catalog
        - name: tmp
          emptyDir:
            sizeLimit: 2Gi
        - name: incoming
          # Ephemeral, node-local: the dump only has to survive the restore,
          # then the DB (tiles-db PVC) is the system of record. A national
          # N50 zip is ~5-7Gi and unzips alongside itself, peaking ~20Gi —
          # 30Gi leaves headroom. Sits on the node's ephemeral disk; ensure
          # the node has the free space (else the pod is evicted).
          emptyDir:
            sizeLimit: 30Gi
        # Rendered DEM-tile cache, node-local SSD of immutable PNGs; the app's
        # LRU keeps usage under TILESERVER_DEM_TILE_CACHE_DISK_BYTES (8Gi), and
        # this 10Gi hard cap is the kubelet's backstop. emptyDir = zero-
        # provisioning (ready on every deploy); it's wiped on pod removal and
        # re-warms — the cache absorbs live load, not persists. (A hostPath PV
        # would keep it warm across deploys; deferred — the browser Cache API
        # now covers per-user revisits, and a PV adds node-coupling risk.)
        - name: dem-cache
          emptyDir:
            sizeLimit: 10Gi
        # Rendered MVT-tile cache, node-local SSD. The app's LRU keeps usage
        # under TILESERVER_MVT_TILE_CACHE_DISK_BYTES (2Gi); the 3Gi cap is the
        # kubelet backstop. Disk-backed (NOT medium: Memory), so it does not
        # count against the pod's 2Gi memory limit — that's the whole point of
        # small-RAM/big-disk. Survives container restarts; wiped on pod removal.
        - name: mvt-cache
          emptyDir:
            sizeLimit: 3Gi
        # Rendered raster-PNG cache, node-local SSD. App LRU keeps usage under
        # TILESERVER_RASTER_TILE_CACHE_DISK_BYTES (2Gi); 3Gi cap is the kubelet
        # backstop. Disk-backed (not medium: Memory) so it stays off the 2Gi
        # memory limit. Survives container restarts; wiped on pod removal.
        - name: raster-cache
          emptyDir:
            sizeLimit: 3Gi
---
apiVersion: v1
kind: Service
metadata:
  name: tileserver
  labels:
    app: tileserver
spec:
  selector:
    app: tileserver
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tileserver-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    # Attach the path rewrite (namespace is patched per-env).
    traefik.ingress.kubernetes.io/router.middlewares: turbo-prod-tileserver-route-rewrite@kubernetescrd
spec:
  rules:
    - host: kart-api.sandring.no
      http:
        # Native tile/asset surface, served directly off kart-api.sandring.no.
        # The same paths are ALSO reachable under the /tiles prefix (see the
        # tileserver-tiles-ingress below) — that's the cache-friendly namespace
        # PUBLIC_BASE_URL hands to clients. The route-rewrite middleware only
        # matches ^/api/route/(.*) — for every other prefix below it's a no-op,
        # so we can list the native /v1 surface alongside the legacy /api/route.
        #
        # Deliberately NOT exposed: /admin (JWT-gated control plane) and
        # /v1/debug (internal inspection) — they have no Ingress path, so
        # Traefik 404s them at the edge.
        paths:
          # Legacy back-compat: /api/route/* -> /v1/route/* (middleware).
          - path: /api/route
            pathType: Prefix
            backend:
              service: &svc
                name: tileserver
                port:
                  number: 8080
          # Vector basemap + style.json.
          - path: /v1/basemap
            pathType: Prefix
            backend:
              service: *svc
          # Terrain-RGB DEM tiles (hillshade/slope source).
          - path: /v1/dem
            pathType: Prefix
            backend:
              service: *svc
          # Slope overlay tiles + sample/along queries.
          - path: /v1/slope
            pathType: Prefix
            backend:
              service: *svc
          # Raster basemap fallback (n50 PNG).
          - path: /v1/raster
            pathType: Prefix
            backend:
              service: *svc
          # Read-only elevation profile/sample.
          - path: /v1/elev
            pathType: Prefix
            backend:
              service: *svc
          # Layer/source catalog (TileJSON-ish discovery).
          - path: /v1/catalog
            pathType: Prefix
            backend:
              service: *svc
          # Placename / nearest search.
          - path: /v1/search
            pathType: Prefix
            backend:
              service: *svc
          # Routing (native path; /api/route above rewrites to this).
          - path: /v1/route
            pathType: Prefix
            backend:
              service: *svc
          # Curated MVT resources (/v1/<resource>/tiles/z/x/y.mvt).
          - path: /v1/hiking-trails
            pathType: Prefix
            backend:
              service: *svc
          - path: /v1/ski-tracks
            pathType: Prefix
            backend:
              service: *svc
          - path: /v1/forest-roads
            pathType: Prefix
            backend:
              service: *svc
          - path: /v1/cycling-routes
            pathType: Prefix
            backend:
              service: *svc
          # SDF glyphs + sprite sheets referenced by the style.
          - path: /fonts
            pathType: Prefix
            backend:
              service: *svc
          - path: /sprite
            pathType: Prefix
            backend:
              service: *svc
---
# Cache-friendly tile namespace: kart-api.sandring.no/tiles/* -> tileserver,
# with the /tiles prefix stripped (tileserver-tiles-strip middleware). This is
# the host PUBLIC_BASE_URL hands to clients, so style.json / sprite / glyphs /
# /v1 MVT + DEM all resolve under one prefix a future Cloudflare Cache Rule can
# target as /tiles/*. Kept as a SEPARATE Ingress (not another path on
# tileserver-ingress) so the strip middleware applies ONLY to /tiles and never
# to the native /v1 + /api/route surface — Traefik merges rules per host and
# routes /tiles/* here by longest-prefix match.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tileserver-tiles-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: turbo-prod-tileserver-tiles-strip@kubernetescrd
spec:
  rules:
    - host: kart-api.sandring.no
      http:
