# CloudNativePG Postgres (PostGIS) for the tileserver's `tiles` database.
#
# LIVE — referenced by base/kustomization.yaml. Holds the self-hosted N50
# basemap data (vann, høydekurve, bygning, kystkontur, isogbre, landcover,
# stedsnavn, vegnett) the tileserver provisions from Geonorge, plus the
# basemap overview matviews. Sized for the NATIONAL dataset (see below).
#
# Separate from the modulith's `turbo-db` so the tileserver owns its data
# lifecycle. Note: the ROUTING endpoints read on-disk artifacts, not this
# DB — so for routing it only needs to exist + migrate at boot (the
# tileserver runs in full mode, no --no-db). The DB matters for curated MVT
# tiles, whose data is ingested separately.
#
# Backups are intentionally omitted (unlike turbo-db): the tiles data is
# re-derivable from source ingest + the artifacts, so it isn't PITR-class.
# Add a barmanObjectStore block later if that changes.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: tiles-db
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgis:17-3.5

  bootstrap:
    initdb:
      database: tiles
      owner: app
      # PostGIS in the tiles DB up front (the app role can't CREATE
      # EXTENSION itself; this runs as the bootstrap superuser).
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS postgis;

  storage:
    # National N50 restores to ~22-28Gi of tables+indexes (8 themes +
    # overview matviews); plus restore churn. 40Gi leaves headroom for a
    # re-provision (old rows DELETEd then re-INSERTed before VACUUM) and
    # future growth. CNPG supports online expansion if the SC allows it.
    size: 40Gi
  walStorage:
    # National restore generates a lot of WAL in one shot; 2Gi can wedge a
    # cold provision. 8Gi absorbs the restore burst.
    size: 8Gi

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      # Restoring + indexing the national dump and serving overview matview
      # queries wants more than 1Gi. Bump with the node/quota if needed.
      memory: 2Gi

  # Tuned for the shared node (these are Cluster-level Postgres params —
  # they do NOT belong on the Database CRD below, whose schema silently
  # drops unknown fields).
  postgresql:
    parameters:
      shared_buffers: "512MB"
      max_connections: "100"
      # Speeds the cold national restore + overview matview builds.
      maintenance_work_mem: "256MB"
---
# Extensions for the tiles DB, created by CNPG (the operator runs them with
# the privileges the `app` role lacks). The tileserver migrations do
# `CREATE EXTENSION IF NOT EXISTS {postgis,pgrouting,postgis_raster,pg_trgm}`
# as the unprivileged `app` role — postgis/pgrouting/postgis_raster are
# *untrusted* so app can't create them itself, but if CNPG already created
# them the IF NOT EXISTS is a privilege-free no-op, so migrations pass.
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: tiles-db-tiles
spec:
  cluster:
    name: tiles-db
  name: tiles
  owner: app
  ensure: present
  databaseReclaimPolicy: retain   # never drop the DB if this CR is removed
  extensions:
    - name: postgis
      ensure: present
    - name: pgrouting
      ensure: present
    - name: postgis_raster
      ensure: present
    - name: pg_trgm
      ensure: present
