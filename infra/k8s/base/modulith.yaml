# Single-process modular monolith host. Runs every module (auth, sharing,
# geo, tracks, collections, activities) in one container; events flow
# in-process (no NATS) and EF Core migrations run at startup
# (MigrateModuleDatabaseAsync in src/Shared/Turbo.Hosting.Postgres) — so
# there are no init/migration containers. All module APIs are served under
# /api/{module} directly, so the ingress targets this Service with no gateway.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: turbo-modulith
  labels:
    app: turbo-modulith
spec:
  replicas: 1
  strategy:
    # Recreate, not surge: the namespace ResourceQuota (limits.memory 6Gi) has
    # no headroom for a 2nd 1Gi modulith pod, so maxSurge:1 deadlocks the
    # rollout (FailedCreate: exceeded quota). With one replica on a quota-tight
    # single node, replace in place — brief unavailability during the new pod's
    # boot (DB migrations) is the only option without raising the quota.
    type: Recreate
  selector:
    matchLabels:
      app: turbo-modulith
  template:
    metadata:
      labels:
        app: turbo-modulith
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654                    # matches the chiseled .NET image's app user
        runAsGroup: 1654
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ghcr-auth                  # private ghcr.io/sigmundgranaas/turbo-* images
      containers:
        - name: turbo-modulith
          image: turbo-modulith            # registry/tag set per-env via kustomize images:
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            # readOnlyRootFilesystem deferred: .NET writes temp + DataProtection keys.
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: ASPNETCORE_ENVIRONMENT
            # GC tuning for a small (1 CPU / 1Gi) container. Server GC keeps a
            # per-core heap and is memory-hungry at this size; Workstation GC has
            # a single, smaller heap and lower baseline RSS. GCConserveMemory (0-9)
            # trades a little throughput to release memory back to the OS sooner —
            # right for a quota-tight single node, wrong for a throughput box.
            - name: DOTNET_gcServer
              value: "0"
            - name: DOTNET_GCConserveMemory
              value: "5"
            # Per-module Npgsql pool ceiling (see Program.cs). Keeps 6 module DBs
            # well under the CNPG max_connections: 100 on the shared instance.
            - name: DB_MAX_POOL_SIZE
              value: "15"
            # Per-module connection strings -> single shared-db, one database per module
            - name: ConnectionStrings__Auth
              valueFrom: { secretKeyRef: { name: db-secrets, key: connectionstring-auth } }
            - name: ConnectionStrings__Sharing
              valueFrom: { secretKeyRef: { name: db-secrets, key: connectionstring-sharing } }
            - name: ConnectionStrings__Geo
              valueFrom: { secretKeyRef: { name: db-secrets, key: connectionstring-geo } }
            - name: ConnectionStrings__Tracks
              valueFrom: { secretKeyRef: { name: db-secrets, key: connectionstring-tracks } }
            - name: ConnectionStrings__Collections
              valueFrom: { secretKeyRef: { name: db-secrets, key: connectionstring-collections } }
            - name: ConnectionStrings__Activities
              valueFrom: { secretKeyRef: { name: db-secrets, key: connectionstring-activities } }
            # NB: Places is NOT in the modulith — it runs as the standalone
            # turbo-places Deployment (base/places.yaml), reached via the
            # /api/places ingress rule.
            # CORS / frontend
            - name: AllowedOrigins
              valueFrom: { configMapKeyRef: { name: app-config, key: CORS__AllowedOrigins } }
            - name: FrontendUrl
              value: "https://kart.sandring.no"
            # Real met.no weather (not the synthetic fallback). met.no's TOS
            # requires an identifying User-Agent with contact info.
            - name: MetNo__UserAgent
              value: "turbo-web/1.0 (https://kart.sandring.no; github.com/sigmundgranaas/turbo)"
            # JWT
            - name: Jwt__Key
              valueFrom: { secretKeyRef: { name: auth-secrets, key: jwt-key } }
            - name: Jwt__Issuer
              valueFrom: { configMapKeyRef: { name: app-config, key: Jwt__Issuer } }
            - name: Jwt__Audience
              valueFrom: { configMapKeyRef: { name: app-config, key: Jwt__Audience } }
            - name: Jwt__TokenExpirationMinutes
              valueFrom: { configMapKeyRef: { name: app-config, key: Jwt__TokenExpirationMinutes } }
            - name: Jwt__RefreshTokenExpirationDays
              valueFrom: { configMapKeyRef: { name: app-config, key: Jwt__RefreshTokenExpirationDays } }
            # Google OAuth
            - name: Authentication__Google__ClientId
              valueFrom: { secretKeyRef: { name: google-oauth-secrets, key: google-client-id } }
            - name: Authentication__Google__ClientSecret
              valueFrom: { secretKeyRef: { name: google-oauth-secrets, key: google-client-secret } }
            - name: Authentication__Google__RedirectUri
              value: "https://kart-api.sandring.no/api/auth/oauth/google/callback"
            - name: Authentication__Google__TokenInfoEndpoint
              valueFrom: { configMapKeyRef: { name: app-config, key: Authentication__Google__TokenInfoEndpoint } }
            # Cookies
            - name: COOKIE_DOMAIN
              value: ".sandring.no"
            - name: COOKIE_SAME_SITE
              value: "None"
            - name: COOKIE_SECURE
              value: "true"
            - name: COOKIE_EXPIRY_DAYS
              value: "7"
            - name: COOKIE_PATH
              value: "/"
            # Observability
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://alloy.observability.svc:4317"   # Alloy OTLP -> Prometheus (traces dropped until Tempo)
            - name: OTEL_SERVICE_NAME
              value: "turbo-modulith"
          startupProbe:               # covers first-boot module migrations (advisory-locked)
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 60      # up to ~5m to migrate before liveness/readiness kick in
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 4
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              # 640Mi (was 1Gi): steady RSS is ~150Mi (Workstation GC), so this is
              # a generous burst ceiling that frees namespace quota for the ingest
              # CronJobs. Bump back if a burst OOMKills.
              memory: "640Mi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: turbo-modulith
  labels:
    app: turbo-modulith
spec:
  selector:
    app: turbo-modulith
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
