# Flutter web frontend served by nginx. Static SPA, no backend deps — it
# talks to the API over the public kart-api.sandring.no from the browser.
# Exposed at kart.sandring.no (TLS terminated upstream, like the API).
# Replica count is owned by the HPA (see hpa.yaml) — no replicas field here.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: turbo-web
  labels:
    app: turbo-web
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: turbo-web
  template:
    metadata:
      labels:
        app: turbo-web
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ghcr-auth                  # private ghcr.io/sigmundgranaas/turbo-web image
      containers:
        - name: turbo-web
          image: turbo-web                 # registry/tag set per-env via kustomize images:
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          volumeMounts:                     # writable paths for read-only rootfs
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: turbo-web
  labels:
    app: turbo-web
spec:
  selector:
    app: turbo-web
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: turbo-web-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: kart.sandring.no
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: turbo-web
                port:
                  number: 8080
