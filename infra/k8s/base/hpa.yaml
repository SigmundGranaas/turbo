# Web is stateless nginx — scale on CPU. Owns turbo-web's replica count
# (the Deployment has no replicas field; ArgoCD ignores it via the app's
# ignoreDifferences). metrics-server is already running on the cluster.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: turbo-web
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: turbo-web
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
