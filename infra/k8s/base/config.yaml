# Non-secret configuration for the modulith. Secrets (db-secrets,
# auth-secrets, google-oauth-secrets, ghcr pull secret) live outside this
# file — see infra/k8s/README.md for how they are provisioned per namespace.
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-config
data:
  postgres-user: "postgres"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  # CORS
  CORS__AllowedOrigins: "https://kart.sandring.no,https://*.sandring.no"
  # JWT
  Jwt__Issuer: "turbo-auth"
  Jwt__Audience: "turbo-client"
  Jwt__TokenExpirationMinutes: "15"
  Jwt__RefreshTokenExpirationDays: "7"
  # Google OAuth
  Authentication__Google__TokenInfoEndpoint: "https://oauth2.googleapis.com/tokeninfo"
