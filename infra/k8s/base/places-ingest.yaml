# Writer for the Places module: orders the SSR (Sentralt stedsnavnregister) GML
# from Geonorge, streams it into the `places` database (reproject → stage), and
# atomically swaps it live. The modulith serves the query side read-only; this
# CronJob is the only writer.
#
# Default area is one fylke (Nordland) — tens of MB, fits the shared CNPG
# cluster. To go national, change the args to `["bulk-ssr","landsdekkende",
# "0000","Hele landet"]` AND bump turbo-db storage.size + this job's memory and
# the /work volume (the national GML extract is ~3GB; ~1M rows).
#
# Requires: egress to nedlasting.geonorge.no (no NetworkPolicy denies it today)
# and the db-secrets `connectionstring-places` key (same value the modulith uses).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: turbo-places-ingest
  labels:
    app: turbo-places-ingest
spec:
  schedule: "0 4 * * 0"          # 04:00 every Sunday — SSR changes slowly
  concurrencyPolicy: Forbid       # never overlap; the atomic swap is exclusive
  startingDeadlineSeconds: 3600
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1800  # 30m: order + download + stage + swap
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: turbo-places-ingest
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1654
            runAsGroup: 1654
            seccompProfile:
              type: RuntimeDefault
          imagePullSecrets:
            - name: ghcr-auth
          containers:
            - name: ingest
              image: turbo-places-ingest    # tag set per-env via kustomize images:
              args: ["bulk-ssr", "fylke", "18", "Nordland"]
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: [ALL]
              env:
                # The ingester reads PLACES_DB (not ConnectionStrings__Places).
                - name: PLACES_DB
                  valueFrom: { secretKeyRef: { name: db-secrets, key: connectionstring-places } }
                # GML download + extract land here (Path.GetTempPath honours TMPDIR).
                - name: TMPDIR
                  value: /work
              volumeMounts:
                - name: work
                  mountPath: /work
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "100m"
                limits:
                  memory: "1Gi"
                  cpu: "1000m"
          volumes:
            - name: work
              emptyDir:
                sizeLimit: 2Gi      # per-fylke GML extract; raise for national
