apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Production environment. Deployed to namespace turbo-prod by the
# turbo-prod ArgoCD Application (see argocd/apps/turbo-prod.yaml).
namespace: turbo-prod

resources:
  - ../../base
  - sealed-secrets.yaml          # auth-secrets, google-oauth-secrets, ghcr-auth
  - sealed-secrets-db.yaml       # db-secrets -> turbo-db-rw (CNPG), app role
  - r2-backup-sealedsecret.yaml  # R2 creds for CNPG barman backups (r2-backup-creds)
  - turbo-db-app-sealedsecret.yaml  # CNPG app-role creds (adopted by turbo-db Cluster)
  # ── Routing (tileserver) — FLIP TO DEPLOY (see README-tileserver.md) ──
  # Create these two sealed secrets first, then uncomment (and uncomment
  # the resources in ../../base/kustomization.yaml):
  #   tiles-db-app-sealedsecret.yaml   — CNPG app-role creds for tiles-db
  #                                       (Secret `tiles-db-app`, basic-auth)
  #   tiles-db-secrets-sealedsecret.yaml — Secret `tiles-db-secrets` with key
  #                                       `connectionstring` =
  #                                       postgres://app:<pwd>@tiles-db-rw:5432/tiles
  # - tiles-db-app-sealedsecret.yaml
  # - tiles-db-secrets-sealedsecret.yaml

labels:
  - pairs:
      environment: prod
    includeSelectors: true

replicas:
  - name: turbo-modulith
    count: 1
  # turbo-web replica count is owned by its HPA (base/hpa.yaml)

images:
  - name: turbo-modulith
    newName: ghcr.io/sigmundgranaas/turbo-modulith
    newTag: latest
  - name: turbo-web
    newName: ghcr.io/sigmundgranaas/turbo-web
    newTag: latest
  # Routing (tileserver) — uncomment together with the resources above.
  # - name: turbo-tileserver
  #   newName: ghcr.io/sigmundgranaas/turbo-tileserver
  #   newTag: latest
