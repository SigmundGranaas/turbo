apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Production environment. Deployed to namespace turbo-prod by the
# turbo-prod ArgoCD Application (see argocd/apps/turbo-prod.yaml).
namespace: turbo-prod

resources:
  - ../../base
  - sealed-secrets.yaml   # generated by scripts/seal-prod-secrets.sh (commit it)

labels:
  - pairs:
      environment: prod
    includeSelectors: true

replicas:
  - name: turbo-modulith
    count: 1
  - name: turbo-web
    count: 1

images:
  - name: turbo-modulith
    newName: ghcr.io/sigmundgranaas/turbo-modulith
    newTag: latest
  - name: turbo-web
    newName: ghcr.io/sigmundgranaas/turbo-web
    newTag: latest
