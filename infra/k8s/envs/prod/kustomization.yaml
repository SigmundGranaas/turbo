apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Production environment. Deployed to namespace turbo-prod by the
# turbo-prod ArgoCD Application (see argocd/apps/turbo-prod.yaml).
namespace: turbo-prod

resources:
  - ../../base
  - sealed-secrets.yaml          # auth-secrets, google-oauth-secrets, ghcr-auth
  - sealed-secrets-db.yaml       # db-secrets -> turbo-db-rw (CNPG), app role
  - r2-backup-sealedsecret.yaml  # R2 creds for CNPG barman backups (r2-backup-creds)
  - turbo-db-app-sealedsecret.yaml  # CNPG app-role creds (adopted by turbo-db Cluster)
  # ── Routing (tileserver) — LIVE ──────────────────────────────────────
  # CNPG owns the tiles-db `app` credential (its auto-generated
  # `tiles-db-app` secret); the tileserver reads its `uri` key directly,
  # so no app-credential secret is sealed here.
  - tileserver-artifacts-pv.yaml      # hostPath PV → /mnt/tiles-artifacts

labels:
  - pairs:
      environment: prod
    includeSelectors: true

replicas:
  - name: turbo-modulith
    count: 1
  # turbo-web replica count is owned by its HPA (base/hpa.yaml)

images:
  - name: turbo-modulith
    newName: ghcr.io/sigmundgranaas/turbo-modulith
    # Immutable, git-traceable tag (api_image_build pushes 0.0.0-<sha7> + :latest;
    # the modulith hosts have no csproj <Version>). Pinning the sha7 makes ArgoCD
    # sync the rollout instead of relying on a manual `:latest` restart. Bump to a
    # green build's 0.0.0-<sha7> and push. (Deployment strategy is Recreate.)
    newTag: "0.0.0-ddb7404"
  - name: turbo-places
    newName: ghcr.io/sigmundgranaas/turbo-places
    # Pinned to a git-traceable sha (was `latest`): a mutable tag never changes
    # the rendered manifest, so ArgoCD wouldn't sync a new build. Bump to a green
    # 0.0.0-<sha7> and push, like the modulith.
    newTag: "0.0.0-ffeda0c"
  - name: turbo-places-ingest
    newName: ghcr.io/sigmundgranaas/turbo-places-ingest
    newTag: latest
  - name: turbo-web
    newName: ghcr.io/sigmundgranaas/turbo-web
    newTag: "d1f245e56cc2c007ef70ea372f208aeccee3af6b"
  - name: turbo-tileserver
    newName: ghcr.io/sigmundgranaas/turbo-tileserver
    # Immutable, git-traceable deploy tag (a commit SHA). Bump this MANUALLY to
    # the SHA of a green tileserver build (CI pushes ghcr turbo-tileserver:<sha>)
    # and push to main — ArgoCD auto-syncs the rollout. (The old CI auto-pin step
    # was removed: branch protection rejected the bot's push, so it always went
    # red.) Don't hand-edit back to `latest` — a mutable tag never triggers sync.
    newTag: "06733f9fa7311f4fef5f2e40d2be8af56064c301"
