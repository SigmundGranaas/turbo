# One-shot remediation: reassign ownership of every object in each module
# database to `app`.
#
# The legacy→CNPG migration left the module-DB objects owned by a non-`app`
# role, so the modulith (which connects as `app`) hit "permission denied
# for table __EFMigrationsHistory" and crash-looped. This Job runs as the
# CNPG superuser and reassigns all object ownership to `app`, preserving
# data. Idempotent — re-running finds nothing to reassign.
#
# Remove this file once the modulith is healthy (and optionally flip
# enableSuperuserAccess back to false on turbo-db).
apiVersion: batch/v1
kind: Job
metadata:
  name: modulith-db-reassign-owners
  labels:
    app: modulith-db-reassign
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: modulith-db-reassign
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 26          # postgres user in the cloudnative-pg image
        runAsGroup: 26
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: reassign
          image: ghcr.io/cloudnative-pg/postgis:17-3.5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          env:
            - name: PGHOST
              value: turbo-db-rw
            - name: PGUSER
              valueFrom: { secretKeyRef: { name: turbo-db-superuser, key: username } }
            - name: PGPASSWORD
              valueFrom: { secretKeyRef: { name: turbo-db-superuser, key: password } }
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              # The legacy data was loaded as the `postgres` superuser, so a
              # blanket `REASSIGN OWNED BY postgres` is refused (it owns
              # system objects). Instead, ALTER ownership of only the
              # user objects in the public schema (tables/sequences/views)
              # to `app`, generated via format() and piped back into psql.
              # Cover ALL user schemas (some modules — e.g. activities —
              # pin their tables to a per-module schema, not public), plus
              # every table/sequence/view in them. Generated via format()
              # and piped back into psql.
              for DB in auth sharing geo tracks collections activities; do
                echo "== ${DB} =="
                psql -tAqc "
                  SELECT format('ALTER SCHEMA %I OWNER TO app;', nspname)
                    FROM pg_namespace
                    WHERE nspname NOT IN ('pg_catalog','information_schema','pg_toast')
                      AND nspname NOT LIKE 'pg_%'
                  UNION ALL
                  SELECT format('GRANT ALL ON SCHEMA %I TO app;', nspname)
                    FROM pg_namespace
                    WHERE nspname NOT IN ('pg_catalog','information_schema','pg_toast')
                      AND nspname NOT LIKE 'pg_%'
                  UNION ALL
                  SELECT format('ALTER TABLE %I.%I OWNER TO app;', schemaname, tablename)
                    FROM pg_tables WHERE schemaname NOT IN ('pg_catalog','information_schema')
                  UNION ALL
                  SELECT format('ALTER SEQUENCE %I.%I OWNER TO app;', sequence_schema, sequence_name)
                    FROM information_schema.sequences WHERE sequence_schema NOT IN ('pg_catalog','information_schema')
                  UNION ALL
                  SELECT format('ALTER VIEW %I.%I OWNER TO app;', table_schema, table_name)
                    FROM information_schema.views WHERE table_schema NOT IN ('pg_catalog','information_schema')
                " "$DB" | psql -v ON_ERROR_STOP=1 -b "$DB"
              done
              echo "ownership reassignment complete"
