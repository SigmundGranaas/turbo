name: turbo

# Modulith deployment: a single Turbo.Host.Modulith process binding every
# module against the per-service Postgres containers. Activities is one
# database; each kind isolates itself with a Postgres schema (the host
# never sees the schema names). The gateway runs in Modulith topology so
# /api/auth/*, /api/geo/*, /api/tracks/*, /api/collections/*, and
# /api/activities/* all forward to the one host. No NATS — events flow
# in-process inside the host.
#
# Usage:
#   docker compose -f compose.yaml -f compose.utils.yaml -f compose.modulith.yaml up
#
# (compose.yaml supplies the Postgres + NATS infrastructure containers; the
#  modulith deploy ignores NATS, but compose.yaml is still the canonical
#  source for the database containers.)

services:
  turbo-modulith:
    build:
      context: ../../apps/api
      dockerfile: hosts/Turbo.Host.Modulith/Dockerfile
    container_name: turbo_modulith
    hostname: modulith
    # 5000 is squatted by macOS Control Center / AirPlay, 5050/5051 by
    # PowerOffice on some dev machines — publish the modulith on 5055
    # which is uncommon enough to dodge the usual conflicts. The gateway
    # on 8080 is still the canonical entry point for the Flutter app.
    ports:
      - "5055:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Auth=Host=${AUTH_DB_HOST:-auth-db};Port=${AUTH_DB_PORT:-5432};Database=${AUTH_DB_NAME:-auth};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-yourpassword}
      - ConnectionStrings__Sharing=Host=${SHARING_DB_HOST:-sharing-db};Port=${SHARING_DB_PORT:-5434};Database=${SHARING_DB_NAME:-sharing};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-yourpassword}
      - ConnectionStrings__Geo=Host=${GEO_DB_HOST:-geo-db};Port=${GEO_DB_PORT:-5435};Database=${GEO_DB_NAME:-geo};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-yourpassword}
      - ConnectionStrings__Tracks=Host=${TRACKS_DB_HOST:-tracks-db};Port=${TRACKS_DB_PORT:-5437};Database=${TRACKS_DB_NAME:-tracks};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-yourpassword}
      - ConnectionStrings__Collections=Host=${COLLECTIONS_DB_HOST:-collections-db};Port=${COLLECTIONS_DB_PORT:-5438};Database=${COLLECTIONS_DB_NAME:-collections};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-yourpassword}
      - ConnectionStrings__Activities=Host=${ACTIVITIES_DB_HOST:-activities-db};Port=${ACTIVITIES_DB_PORT:-5439};Database=${ACTIVITIES_DB_NAME:-activities};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-yourpassword}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=turbo-modulith
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /healthz HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - turbo

  turbo-gateway:
    build:
      context: ../../apps/api
      dockerfile: src/Gateway/Dockerfile
    container_name: turbo_gateway
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Topology=Modulith
    depends_on:
      turbo-modulith:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /healthz HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - turbo

  # Migrations run in-process at modulith host startup via EF Core
  # (see MigrateModuleDatabaseAsync in src/Shared/Turbo.Hosting.Postgres).
  # No separate migration containers needed.
