name: turbo

# Microservices deployment: three single-module hosts behind the gateway,
# NATS as the transport between them. Database layout is parameterised so
# the same compose file works against either the default per-service
# Postgres containers (compose.yaml) or a single shared Postgres
# (compose.databases.shared.yaml + .env.shared).

services:
  turboapi-auth:
    build:
      context: ../../apps/api
      dockerfile: hosts/Turbo.Host.Auth/Dockerfile
    container_name: turboapi_auth
    hostname: auth
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Auth=Host=${AUTH_DB_HOST:-auth-db};Port=${AUTH_DB_PORT:-5432};Database=${AUTH_DB_NAME:-auth};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-yourpassword}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=turboapi-auth
      - Nats__Url=nats://nats:4222
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /healthz HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - turbo

  turboapi-geo:
    build:
      context: ../../apps/api
      dockerfile: hosts/Turbo.Host.Geo/Dockerfile
    container_name: turboapi_geo
    hostname: geo
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Geo=Host=${GEO_DB_HOST:-geo-db};Port=${GEO_DB_PORT:-5435};Database=${GEO_DB_NAME:-geo};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-yourpassword}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=turboapi-geo
      - Nats__Url=nats://nats:4222
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /healthz HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - turbo

  turboapi-tracks:
    build:
      context: ../../apps/api
      dockerfile: hosts/Turbo.Host.Tracks/Dockerfile
    container_name: turboapi_tracks
    hostname: tracks
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Tracks=Host=${TRACKS_DB_HOST:-tracks-db};Port=${TRACKS_DB_PORT:-5437};Database=${TRACKS_DB_NAME:-tracks};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-yourpassword}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=turboapi-tracks
      - Nats__Url=nats://nats:4222
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /healthz HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - turbo

  turboapi-collections:
    build:
      context: ../../apps/api
      dockerfile: hosts/Turbo.Host.Collections/Dockerfile
    container_name: turboapi_collections
    hostname: collections
    ports:
      - "5004:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Collections=Host=${COLLECTIONS_DB_HOST:-collections-db};Port=${COLLECTIONS_DB_PORT:-5438};Database=${COLLECTIONS_DB_NAME:-collections};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-yourpassword}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=turboapi-collections
      - Nats__Url=nats://nats:4222
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /healthz HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - turbo

  # Activities host: serves all six activity kinds (fishing / backcountry_ski
  # / hiking / xc_ski / packrafting / freediving) plus the cross-kind
  # summaries projection. One database, schema-per-kind — schemas are
  # owned internally by each module (see Add{Kind}ActivityModule).
  turboapi-activities:
    build:
      context: ../../apps/api
      dockerfile: hosts/Turbo.Host.Activities/Dockerfile
    container_name: turboapi_activities
    hostname: activities
    ports:
      - "5005:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Activities=Host=${ACTIVITIES_DB_HOST:-activities-db};Port=${ACTIVITIES_DB_PORT:-5439};Database=${ACTIVITIES_DB_NAME:-activities};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-yourpassword}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=turboapi-activities
      - Nats__Url=nats://nats:4222
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /healthz HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - turbo

  turboapi-gateway:
    build:
      context: ../../apps/api
      dockerfile: src/Gateway/Dockerfile
    container_name: turboapi_gateway
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - Topology=Microservices
    depends_on:
      turboapi-auth:
        condition: service_healthy
      turboapi-geo:
        condition: service_healthy
      turboapi-tracks:
        condition: service_healthy
      turboapi-collections:
        condition: service_healthy
      turboapi-activities:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /healthz HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - turbo

  # Migrations run in-process at each host's startup via EF Core
  # (see MigrateModuleDatabaseAsync in src/Shared/Turbo.Hosting.Postgres).
  # No separate migration containers needed.
