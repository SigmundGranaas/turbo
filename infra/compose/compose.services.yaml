name: turbo

# Microservices deployment: three single-module hosts behind the gateway,
# NATS as the transport between them. Database layout is parameterised so
# the same compose file works against either the default per-service
# Postgres containers (compose.yaml) or a single shared Postgres
# (compose.databases.shared.yaml + .env.shared).

services:
  turbo-auth:
    build:
      context: ../../apps/api
      dockerfile: hosts/Turbo.Host.Auth/Dockerfile
    container_name: turbo_auth
    hostname: auth
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Auth=Host=${AUTH_DB_HOST:-auth-db};Port=${AUTH_DB_PORT:-5432};Database=${AUTH_DB_NAME:-auth};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-yourpassword}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=turbo-auth
      - Nats__Url=nats://nats:4222
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /healthz HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - turbo

  turbo-geo:
    build:
      context: ../../apps/api
      dockerfile: hosts/Turbo.Host.Geo/Dockerfile
    container_name: turbo_geo
    hostname: geo
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Geo=Host=${GEO_DB_HOST:-geo-db};Port=${GEO_DB_PORT:-5435};Database=${GEO_DB_NAME:-geo};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-yourpassword}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=turbo-geo
      - Nats__Url=nats://nats:4222
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /healthz HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - turbo

  turbo-tracks:
    build:
      context: ../../apps/api
      dockerfile: hosts/Turbo.Host.Tracks/Dockerfile
    container_name: turbo_tracks
    hostname: tracks
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Tracks=Host=${TRACKS_DB_HOST:-tracks-db};Port=${TRACKS_DB_PORT:-5437};Database=${TRACKS_DB_NAME:-tracks};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-yourpassword}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=turbo-tracks
      - Nats__Url=nats://nats:4222
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /healthz HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - turbo

  turbo-collections:
    build:
      context: ../../apps/api
      dockerfile: hosts/Turbo.Host.Collections/Dockerfile
    container_name: turbo_collections
    hostname: collections
    ports:
      - "5004:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Collections=Host=${COLLECTIONS_DB_HOST:-collections-db};Port=${COLLECTIONS_DB_PORT:-5438};Database=${COLLECTIONS_DB_NAME:-collections};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-yourpassword}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=turbo-collections
      - Nats__Url=nats://nats:4222
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /healthz HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - turbo

  turbo-sharing:
    build:
      context: ../../apps/api
      dockerfile: hosts/Turbo.Host.Sharing/Dockerfile
    container_name: turbo_sharing
    hostname: sharing
    ports:
      - "5006:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Sharing=Host=${SHARING_DB_HOST:-sharing-db};Port=${SHARING_DB_PORT:-5434};Database=${SHARING_DB_NAME:-sharing};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-yourpassword}
      # Sharing's sidecar subscribers read from peer streams to maintain
      # Resource envelopes; the backfill reads the read tables once at
      # startup. Connection strings for the source modules are optional —
      # missing ones are skipped.
      - ConnectionStrings__Collections=Host=${COLLECTIONS_DB_HOST:-collections-db};Port=${COLLECTIONS_DB_PORT:-5438};Database=${COLLECTIONS_DB_NAME:-collections};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-yourpassword}
      - ConnectionStrings__Geo=Host=${GEO_DB_HOST:-geo-db};Port=${GEO_DB_PORT:-5435};Database=${GEO_DB_NAME:-geo};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-yourpassword}
      - ConnectionStrings__Tracks=Host=${TRACKS_DB_HOST:-tracks-db};Port=${TRACKS_DB_PORT:-5437};Database=${TRACKS_DB_NAME:-tracks};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-yourpassword}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=turbo-sharing
      - Nats__Url=nats://nats:4222
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /healthz HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - turbo

  # Activities host: serves all six activity kinds (fishing / backcountry_ski
  # / hiking / xc_ski / packrafting / freediving) plus the cross-kind
  # summaries projection. One database, schema-per-kind — schemas are
  # owned internally by each module (see Add{Kind}ActivityModule).
  turbo-activities:
    build:
      context: ../../apps/api
      dockerfile: hosts/Turbo.Host.Activities/Dockerfile
    container_name: turbo_activities
    hostname: activities
    ports:
      - "5005:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Activities=Host=${ACTIVITIES_DB_HOST:-activities-db};Port=${ACTIVITIES_DB_PORT:-5439};Database=${ACTIVITIES_DB_NAME:-activities};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-yourpassword}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=turbo-activities
      - Nats__Url=nats://nats:4222
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /healthz HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - turbo

  turbo-gateway:
    build:
      context: ../../apps/api
      dockerfile: src/Gateway/Dockerfile
    container_name: turbo_gateway
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Topology=Microservices
    depends_on:
      turbo-auth:
        condition: service_healthy
      turbo-geo:
        condition: service_healthy
      turbo-tracks:
        condition: service_healthy
      turbo-collections:
        condition: service_healthy
      turbo-sharing:
        condition: service_healthy
      turbo-activities:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /healthz HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - turbo

  # Migrations run in-process at each host's startup via EF Core
  # (see MigrateModuleDatabaseAsync in src/Shared/Turbo.Hosting.Postgres).
  # No separate migration containers needed.

  tileserver:
    build:
      # Repo root so the Dockerfile can pull both apps/tileserver and
      # apps/admin (the React SPA is bundled into the same image).
      context: ../..
      dockerfile: apps/tileserver/Dockerfile
    container_name: tileserver
    hostname: tileserver
    ports:
      - "8090:8080"
    environment:
      - RUST_LOG=info,tower_http=debug,sqlx=warn
      - DATABASE_URL=postgres://${DB_USER:-postgres}:${DB_PASSWORD:-yourpassword}@${TILES_DB_HOST:-tiles-db}:${TILES_DB_PORT:-5432}/${TILES_DB_NAME:-tiles}
      - JWT_SECRET=${JWT_SECRET:-default-super-secret-key-needs-to-be-long-enough-for-hs256}
      - JWT_ISSUER=${JWT_ISSUER:-}
      - JWT_AUDIENCE=${JWT_AUDIENCE:-}
      - PUBLIC_BASE_URL=${TILESERVER_PUBLIC_BASE_URL:-http://localhost:8090}
      - AUTO_MIGRATE=true
    depends_on:
      tiles-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /healthz HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - turbo

  tiles-db:
    build:
      context: postgis-pgrouting
      dockerfile: Dockerfile
    container_name: tiles-db
    hostname: tiles-db
    ports:
      - "5446:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-yourpassword}
      POSTGRES_DB: ${TILES_DB_NAME:-tiles}
    volumes:
      - tiles_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${TILES_DB_NAME:-tiles}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - turbo

volumes:
  tiles_db_data:
