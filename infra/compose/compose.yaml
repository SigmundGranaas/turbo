  nats:
    image: nats:2.10-alpine
    hostname: nats
    container_name: nats
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring + health
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    volumes:
      - nats_data:/data
    networks:
      - turbo

volumes:
  auth_data:
  geo_data:
  tracks_data:
  collections_data:
  activities_data:
  activities_fishing_data:
  activities_backcountry_ski_data:
  activities_hiking_data:
  activities_xc_ski_data:
  activities_packrafting_data:
  activities_freediving_data:
  nats_data:

networks:
  turbo:
    driver: bridge
