name: Android release (downloadable APK)

# On every push to main that touches the Android app, build the APK and publish
# it to a versioned GitHub Release so it can be downloaded and installed.
on:
  push:
    branches: [ "main" ]
    paths:
      - 'apps/android/**'
      - '.github/workflows/android_release.yml'
  workflow_dispatch: {}   # also runnable on demand from the Actions tab

permissions:
  contents: write   # required to create releases + tags

jobs:
  publish-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      # The app bundles the wgpu engine (:core:turbomap-android) — its per-ABI .so
      # is cross-compiled with cargo-ndk + uniffi bindings generated, so the release
      # build needs the Rust toolchain + NDK.
      - name: Install protoc (turbomap-mvt compiles .proto)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Rust + Android targets + cargo-ndk
        run: |
          rustup toolchain install 1.94.1 --profile minimal --target aarch64-linux-android --target x86_64-linux-android
          cargo install cargo-ndk --locked
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/turbomap

      - name: Read version name
        id: ver
        run: |
          V=$(grep -oE 'versionName = "[^"]+"' app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "name=$V" >> "$GITHUB_OUTPUT"

      - name: Build release APKs (per-ABI, sideload-signed)
        run: ./gradlew :app:assembleRelease --no-configuration-cache

      - name: Stage the arm64-v8a APK
        # Per-ABI split (no universal "mega" APK). 64-bit ARM is what every modern
        # phone uses; the smaller armeabi-v7a slice is left unpublished. Signed with
        # the committed sideload key, so it reinstalls over earlier builds cleanly.
        run: |
          mkdir -p "$RUNNER_TEMP/out"
          cp app/build/outputs/apk/release/app-arm64-v8a-release.apk \
            "$RUNNER_TEMP/out/turbo-expressive-${{ steps.ver.outputs.name }}-build${{ github.run_number }}-arm64-v8a.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ steps.ver.outputs.name }}-build${{ github.run_number }}
          name: Turbo Expressive ${{ steps.ver.outputs.name }} (build ${{ github.run_number }})
          body: |
            Native Jetpack Compose · Material 3 Expressive build of Turbo.
            **arm64-v8a** release APK (64-bit ARM — every modern phone). Sideload-signed
            with the dedicated key, so it reinstalls over earlier builds without a
            signature conflict. Enable "install from unknown sources". Built from ${{ github.sha }}.
          files: ${{ runner.temp }}/out/*.apk
          fail_on_unmatched_files: true
