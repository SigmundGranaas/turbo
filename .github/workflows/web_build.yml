name: Build Web Image

# Builds + pushes the `turbo-web` image from the React app (apps/web) + the
# turbomap WASM renderer (apps/turbomap). This image is served at
# kart.sandring.no — it replaced the old Flutter web image (same name + nginx
# :8080 contract, so infra/k8s/base/web.yaml is unchanged). Prod pins
# `turbo-web:latest` and ArgoCD auto-syncs the rollout.
on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'apps/turbomap/**'
      - '.github/workflows/web_build.yml'
  pull_request:
    paths:
      - 'apps/web/**'
      - 'apps/turbomap/**'
      - '.github/workflows/web_build.yml'

jobs:
  build-web-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lowercase owner
        id: owner
        run: echo "lc=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Context is `apps/` so the build sees both web/ (React) and turbomap/
      # (the WASM renderer, a file: dep). See apps/web/Dockerfile.
      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: apps
          file: apps/web/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/turbo-web:${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.lc }}/turbo-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
