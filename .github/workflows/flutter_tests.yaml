name: Flutter Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/flutter/**'
      - '.github/workflows/flutter_tests.yaml'
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/flutter/**'
      - '.github/workflows/flutter_tests.yaml'

jobs:
  test:
    name: Run Flutter Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/flutter

    steps:
      - uses: actions/checkout@v4

      - name: Install SQLite
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3 libsqlite3-dev
        working-directory: .

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run analyzer
        run: flutter analyze

      - name: Run tests
        run: flutter test --coverage
