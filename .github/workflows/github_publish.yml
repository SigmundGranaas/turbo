name: Build and Release Flutter App

on:
  push:
    branches:
      - main
    paths:
      - 'apps/flutter/**'
      - '.github/workflows/github_publish.yml'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/flutter

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Create Keystore and Signing Properties
        run: |
          echo "Decoding keystore..."
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.jks
          echo "Keystore decoded to android/app/release.jks"

          echo "Creating key.properties file..."
          echo "storePassword=${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.RELEASE_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.RELEASE_KEY_ALIAS }}" >> android/key.properties

          echo "storeFile=release.jks" >> android/key.properties

          echo "key.properties created."

      - name: Get App Version
        id: get_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | cut -d ' ' -f 2)
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build Release APK
        run: flutter build apk --release --build-name=${{ env.APP_VERSION }} --build-number=${{ github.run_number }} --split-per-abi

      - name: Find and Rename APKs
        run: |
          mkdir -p release-artifacts
          find build/app/outputs/flutter-apk -name 'app-*-release.apk' -exec mv {} release-artifacts/ \;
          ls -R release-artifacts

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: Turbo Release v${{ env.APP_VERSION }}
          generate_release_notes: true
          files: apps/flutter/release-artifacts/*

  build-web-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get app version
        id: version
        run: echo "version=$(grep '^version:' apps/flutter/pubspec.yaml | cut -d ' ' -f 2)" >> "$GITHUB_OUTPUT"

      - name: Lowercase owner
        id: owner
        run: echo "lc=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: apps/flutter
          file: apps/flutter/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/turbo-web:${{ steps.version.outputs.version }}
            ghcr.io/${{ steps.owner.outputs.lc }}/turbo-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
