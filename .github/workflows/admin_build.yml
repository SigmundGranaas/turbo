name: Admin SPA build

on:
  push:
    branches: [ "main" ]
    paths:
      - 'apps/admin/**'
      - '.github/workflows/admin_build.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'apps/admin/**'
      - '.github/workflows/admin_build.yml'

jobs:
  build-and-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/admin/package-lock.json

      - name: Install
        run: npm ci || npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
