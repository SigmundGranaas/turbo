name: Android build and test

on:
  push:
    branches: [ "main" ]
    paths:
      - 'apps/android/**'
      - '.github/workflows/android_build.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'apps/android/**'
      - '.github/workflows/android_build.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Static analysis (detekt)
        run: ./gradlew detekt --no-configuration-cache

      - name: Unit + architecture tests
        run: >-
          ./gradlew
          :core:model:test :core:common:test
          :core:data:testDebugUnitTest
          :feature:search:testDebugUnitTest :feature:map:testDebugUnitTest
          :feature:recording:testDebugUnitTest
          :app:testDebugUnitTest
          --no-configuration-cache

      - name: Assemble debug
        run: ./gradlew :app:assembleDebug --no-configuration-cache
