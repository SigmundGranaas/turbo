name: Android on-device engine tests (Lane E)

# Runs the wgpu engine on a real Android runtime (emulator GPU) via the
# instrumented test in :core:turbomap-android — the on-device counterpart to the
# host-GPU Lane D. Heavier (NDK cross-compile + KVM emulator), so it's its own
# workflow, triggered when the Rust FFI crate or the Android module changes.
on:
  push:
    branches: [ "main" ]
    paths:
      - 'apps/android/core/turbomap-android/**'
      - 'apps/turbomap/**'
      - '.github/workflows/android_device.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'apps/android/core/turbomap-android/**'
      - 'apps/turbomap/**'
      - '.github/workflows/android_device.yml'

jobs:
  on-device:
    # ubuntu-latest x86_64 runner → x86_64 emulator image (the module also
    # builds arm64-v8a; only the host ABI is needed here).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Rust toolchain + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          # The Gradle module cross-compiles both ABIs (x86_64 for the
          # emulator, arm64-v8a for real devices), so both Rust targets must
          # be installed or `buildRustFfiAndroid` fails compiling its first
          # dependency for aarch64.
          targets: x86_64-linux-android, aarch64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/turbomap

      - name: Install protoc + cargo-ndk
        run: |
          sudo apt-get update && sudo apt-get install -y protobuf-compiler
          cargo install cargo-ndk --locked

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      # The Gradle module builds the host cdylib (for bindgen) + cross-compiles
      # the x86_64 .so via cargo-ndk; the emulator-runner provides the device.
      # The runner image ships an NDK; point cargo-ndk at it.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger --name-match=kvm

      - name: On-device instrumented test
        uses: reactivecircus/android-emulator-runner@v2
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_LATEST_HOME }}
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          working-directory: apps/android
          script: ./gradlew :core:turbomap-android:connectedDebugAndroidTest --no-configuration-cache
