name: Turbomap build and test

on:
  push:
    branches: [ "main" ]
    paths:
      - 'apps/turbomap/**'
      - '.github/workflows/turbomap_build.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'apps/turbomap/**'
      - '.github/workflows/turbomap_build.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast lane: pure-Rust unit/property tests + lints. No GPU. Runs every
  # value-boundary test in the workspace, including the trace-format
  # contract in turbomap-golden.
  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/turbomap

    steps:
      - uses: actions/checkout@v4

      # turbomap-mvt compiles .proto at build time via prost-build.
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/turbomap

      - name: Test (workspace)
        run: cargo test --workspace

      # Deny warnings only on the crates we actively build toward the new
      # engine. The legacy desktop demo (turbomap-app) still carries
      # warnings; full-workspace clippy below is informational until it is
      # cleaned up.
      - name: Clippy (engine crates, deny warnings)
        run: cargo clippy -p turbomap-core -p turbomap-scene -p turbomap-golden -p turbomap-engine -p turbomap-ffi -p turbomap-sim --all-targets -- -D warnings

      # The uniffi surface must stay generatable: build the cdylib and
      # produce the Kotlin + Swift sources from it.
      - name: Generate FFI bindings (Kotlin + Swift)
        run: |
          cargo build -p turbomap-ffi
          cargo run -q -p turbomap-ffi --bin uniffi-bindgen -- generate \
            --library target/debug/libturbomap_ffi.so \
            --language kotlin --language swift --no-format \
            --out-dir target/ffi-bindings
          test -s target/ffi-bindings/uniffi/turbomap_ffi/turbomap_ffi.kt
          test -s target/ffi-bindings/turbomap_ffi.swift

      - name: Upload FFI bindings
        uses: actions/upload-artifact@v4
        with:
          name: ffi-bindings
          path: apps/turbomap/target/ffi-bindings/

      - name: Clippy (full workspace, informational)
        run: cargo clippy --workspace --all-targets
        continue-on-error: true

      # The workspace is not yet clean under stable rustfmt (formatted with
      # a different rustfmt); surfaced as a signal, not a gate, pending a
      # workspace-wide format pass.
      - name: Format check (informational)
        run: cargo fmt --all -- --check
        continue-on-error: true

  # Golden lane: GPU-backed render tests on Lavapipe (Mesa's software
  # Vulkan). Deterministic, no real GPU required.
  golden:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/turbomap

    steps:
      - uses: actions/checkout@v4

      - name: Install protoc + Lavapipe (software Vulkan)
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler mesa-vulkan-drivers vulkan-tools

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/turbomap

      # REQUIRE_GPU makes a missing adapter a hard failure, so a broken
      # Lavapipe install can't silently skip the suite. The Vulkan loader
      # auto-discovers the lavapipe ICD; force_fallback_adapter selects it.
      - name: Golden render tests (harness)
        env:
          REQUIRE_GPU: "1"
        run: cargo test -p turbomap-golden --features gpu-tests

      # Engine conformance + scene-vs-imperative golden parity.
      - name: Engine GPU tests
        env:
          REQUIRE_GPU: "1"
        run: cargo test -p turbomap-engine --features gpu-tests

      # The full host round-trip through the uniffi-exported surface.
      - name: FFI round-trip tests
        env:
          REQUIRE_GPU: "1"
        run: cargo test -p turbomap-ffi --features gpu-tests

      # Headless device sessions: scripted journeys against the synthetic
      # world, with behavioural + frame-budget assertions.
      - name: Session simulator tests
        env:
          REQUIRE_GPU: "1"
        run: cargo test -p turbomap-sim --features gpu-tests

      - name: Upload session reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sim-reports
          path: apps/turbomap/target/sim-reports/
          if-no-files-found: ignore

      - name: Upload golden failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-failures
          path: apps/turbomap/target/golden-failures/
          if-no-files-found: ignore
