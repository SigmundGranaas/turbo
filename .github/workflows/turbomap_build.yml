name: Turbomap build and test

on:
  push:
    # The engine-architecture branch runs the full ladder pre-merge (plan
    # P6.0): 55+ commits of Phases 0-5 landed without CI ever firing because
    # every lane was main-only.
    branches: [ "main", "claude/mapping-engine-architecture-nov1k1" ]
    paths:
      - 'apps/turbomap/**'
      - '.github/workflows/turbomap_build.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'apps/turbomap/**'
      - '.github/workflows/turbomap_build.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast lane: pure-Rust unit/property tests + lints. No GPU, no golden
  # pixel-comparison — rendering correctness is verified on-device and via the
  # pure-Rust unit/property suite.
  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/turbomap

    steps:
      - uses: actions/checkout@v4

      # turbomap-mvt compiles .proto at build time via prost-build.
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/turbomap

      - name: Test (workspace)
        run: cargo test --workspace

      # Deny warnings only on the crates we actively build toward the new
      # engine. The legacy desktop demo (turbomap-app) still carries
      # warnings; full-workspace clippy below is informational until it is
      # cleaned up.
      - name: Clippy (engine crates, deny warnings)
        run: cargo clippy -p turbomap-core -p turbomap-scene -p turbomap-engine -p turbomap-ffi -p turbomap-sim --all-targets -- -D warnings

      # The uniffi surface must stay generatable: build the cdylib and
      # produce the Kotlin + Swift sources from it.
      - name: Generate FFI bindings (Kotlin + Swift)
        run: |
          cargo build -p turbomap-ffi
          cargo run -q -p turbomap-ffi --bin uniffi-bindgen -- generate \
            --library target/debug/libturbomap_ffi.so \
            --language kotlin --language swift --no-format \
            --out-dir target/ffi-bindings
          test -s target/ffi-bindings/uniffi/turbomap_ffi/turbomap_ffi.kt
          test -s target/ffi-bindings/turbomap_ffi.swift

      - name: Upload FFI bindings
        uses: actions/upload-artifact@v4
        with:
          name: ffi-bindings
          path: apps/turbomap/target/ffi-bindings/

      - name: Clippy (full workspace, informational)
        run: cargo clippy --workspace --all-targets
        continue-on-error: true

      # The workspace is not yet clean under stable rustfmt (formatted with
      # a different rustfmt); surfaced as a signal, not a gate, pending a
      # workspace-wide format pass.
      - name: Format check (informational)
        run: cargo fmt --all -- --check
        continue-on-error: true

  # GPU lane (plan P6.0): the golden/behavioural suites are feature-gated —
  # plain `cargo test` runs ZERO of them, which silently masked regressions
  # twice. Lavapipe (software Vulkan) is the adapter; REQUIRE_GPU=1 makes a
  # missing adapter a hard failure instead of a vacuous skip.
  gpu:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: apps/turbomap

    steps:
      - uses: actions/checkout@v4

      - name: Install protoc + Lavapipe (software Vulkan)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler mesa-vulkan-drivers vulkan-tools

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/turbomap
          key: gpu-tests

      - name: GPU suites (engine + golden + ffi, goldens byte-compared)
        env:
          REQUIRE_GPU: "1"
        run: >
          cargo test -p turbomap-engine -p turbomap-golden -p turbomap-ffi
          --features turbomap-engine/gpu-tests,turbomap-golden/gpu-tests,turbomap-ffi/gpu-tests

  # wasm lane (plan P6.0): compile-clean is necessary but NOT sufficient on
  # wasm (the D1 std::time::Instant panic compiled fine) — the web workflow's
  # runtime smoke stays the behavioural gate; this catches the cheap half.
  wasm:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/turbomap

    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/turbomap
          key: wasm

      - name: Check turbomap-web (wasm32)
        run: cargo check -p turbomap-web --target wasm32-unknown-unknown
