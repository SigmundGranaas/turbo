name: Turbomap build and test

on:
  push:
    branches: [ "main" ]
    paths:
      - 'apps/turbomap/**'
      - '.github/workflows/turbomap_build.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'apps/turbomap/**'
      - '.github/workflows/turbomap_build.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast lane: pure-Rust unit/property tests + lints. No GPU. Runs every
  # value-boundary test in the workspace, including the trace-format
  # contract in turbomap-golden.
  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/turbomap

    steps:
      - uses: actions/checkout@v4

      # turbomap-mvt compiles .proto at build time via prost-build.
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/turbomap

      - name: Test (workspace)
        run: cargo test --workspace

      # Deny warnings only on the crates we actively build toward the new
      # engine. The legacy desktop demo (turbomap-app) still carries
      # warnings; full-workspace clippy below is informational until it is
      # cleaned up.
      - name: Clippy (engine crates, deny warnings)
        run: cargo clippy -p turbomap-core -p turbomap-scene -p turbomap-golden -p turbomap-engine -p turbomap-ffi -p turbomap-sim --all-targets -- -D warnings

      # The uniffi surface must stay generatable: build the cdylib and
      # produce the Kotlin + Swift sources from it.
      - name: Generate FFI bindings (Kotlin + Swift)
        run: |
          cargo build -p turbomap-ffi
          cargo run -q -p turbomap-ffi --bin uniffi-bindgen -- generate \
            --library target/debug/libturbomap_ffi.so \
            --language kotlin --language swift --no-format \
            --out-dir target/ffi-bindings
          test -s target/ffi-bindings/uniffi/turbomap_ffi/turbomap_ffi.kt
          test -s target/ffi-bindings/turbomap_ffi.swift

      - name: Upload FFI bindings
        uses: actions/upload-artifact@v4
        with:
          name: ffi-bindings
          path: apps/turbomap/target/ffi-bindings/

      - name: Clippy (full workspace, informational)
        run: cargo clippy --workspace --all-targets
        continue-on-error: true

      # The workspace is not yet clean under stable rustfmt (formatted with
      # a different rustfmt); surfaced as a signal, not a gate, pending a
      # workspace-wide format pass.
      - name: Format check (informational)
        run: cargo fmt --all -- --check
        continue-on-error: true

  # NOTE: the GPU "golden" lane (Lavapipe pixel-comparison render tests) was
  # removed — it was chronically red on software-rasteriser font/AA drift and
  # forced re-blessing from CI artifacts on every visual change, which cost
  # more than it caught. Rendering correctness is now verified on-device and
  # via the pure-Rust unit/property suite above. The golden *harness* code
  # (turbomap-golden, *-sim) stays in the tree for local/manual use.
