# Metrics + dashboards + alerting. Lean values for the single 6Gi node:
# short retention, single replicas, modest limits. Grafana is ClusterIP
# (access via port-forward) to avoid a new public hostname. Prometheus has
# the remote-write receiver on so Alloy can push app OTLP metrics.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 77.16.0
    helm:
      values: |
        crds:
          enabled: true
        alertmanager:
          alertmanagerSpec:
            replicas: 1
            resources:
              requests: { cpu: 10m, memory: 32Mi }
              limits: { memory: 96Mi }
            storage:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources: { requests: { storage: 1Gi } }
        grafana:
          defaultDashboardsTimezone: browser
          resources:
            requests: { cpu: 20m, memory: 64Mi }
            limits: { memory: 256Mi }
          persistence:
            enabled: true
            size: 2Gi
          # Loki added as a datasource once it's deployed (sidecar picks up
          # the ConfigMap shipped with the loki app).
          sidecar:
            datasources:
              enabled: true
        prometheus:
          prometheusSpec:
            retention: 7d
            retentionSize: 7GB
            enableRemoteWriteReceiver: true          # Alloy pushes app OTLP metrics here
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            resources:
              requests: { cpu: 150m, memory: 384Mi }
              limits: { memory: 1Gi }
            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources: { requests: { storage: 8Gi } }
        prometheus-node-exporter:
          resources:
            requests: { cpu: 10m, memory: 24Mi }
            limits: { memory: 64Mi }
        kube-state-metrics:
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { memory: 96Mi }
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true        # large CRDs (Prometheus operator)
