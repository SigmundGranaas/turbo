# Grafana Alloy — collector DaemonSet. Tails pod logs into Loki and accepts
# app OTLP, forwarding metrics to Prometheus (remote-write). Traces are
# dropped for now (no Tempo); wire a traces exporter when Tempo lands.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: alloy
    targetRevision: 1.8.2
    helm:
      values: |
        controller:
          type: daemonset
        alloy:
          resources:
            requests: { cpu: 30m, memory: 96Mi }
            limits: { memory: 256Mi }
          extraPorts:
            - name: otlp-grpc
              port: 4317
              targetPort: 4317
              protocol: TCP
            - name: otlp-http
              port: 4318
              targetPort: 4318
              protocol: TCP
          configMap:
            content: |
              // ---- Pod logs -> Loki ----
              discovery.kubernetes "pods" {
                role = "pod"
              }
              discovery.relabel "pods" {
                targets = discovery.kubernetes.pods.targets
                rule {
                  source_labels = ["__meta_kubernetes_namespace"]
                  target_label  = "namespace"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_name"]
                  target_label  = "pod"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_container_name"]
                  target_label  = "container"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_label_app"]
                  target_label  = "app"
                }
              }
              loki.source.kubernetes "pods" {
                targets    = discovery.relabel.pods.output
                forward_to = [loki.write.default.receiver]
              }
              loki.write "default" {
                endpoint {
                  url = "http://loki-gateway.observability.svc/loki/api/v1/push"
                }
              }

              // ---- App OTLP -> Prometheus (metrics); traces/logs dropped ----
              otelcol.receiver.otlp "in" {
                grpc { endpoint = "0.0.0.0:4317" }
                http { endpoint = "0.0.0.0:4318" }
                output {
                  metrics = [otelcol.exporter.prometheus.to_prom.input]
                }
              }
              otelcol.exporter.prometheus "to_prom" {
                forward_to = [prometheus.remote_write.default.receiver]
              }
              prometheus.remote_write "default" {
                endpoint {
                  url = "http://kube-prometheus-stack-prometheus.observability.svc:9090/api/v1/write"
                }
              }
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
