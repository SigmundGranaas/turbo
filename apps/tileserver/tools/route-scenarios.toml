# Routing scenario corpus.
#
# Each `[[scenario]]` is a named, asserted routing case the system
# must continue to handle correctly. Run via:
#
#   cargo test --workspace --test scenarios
#
# The test harness posts each query to a running tileserver
# (`TURBO_TEST_HOST`, default `http://127.0.0.1:8090`) and checks
# the response against the `[scenario.assert]` block. The test
# skips with a warning when the server isn't reachable so a CI
# run without artifacts doesn't fail.
#
# Add a new scenario when:
# - You manually validate a route and want it codified
# - You fix a regression and want to lock the behaviour
# - You add a new cost contributor and want a query that
#   exercises it
#
# Anti-patterns to avoid:
# - Don't over-specify length. Use ranges that bracket the answer
#   with ~15% headroom; routing decisions can shift on legitimate
#   recalibration without being wrong.
# - Don't assert exact fkb_breakdown percentages. Assert minima/
#   maxima per surface so small drift doesn't break the corpus.
# - One scenario = one concern. Two queries chasing the same
#   property are noise.

# ============================================================
# Q1 — Trail-following baseline.
# Both endpoints sit on real N50 sti edges in Valnesfjord; the
# system must follow the trail, not cut crow-flies across forest.
# This is THE regression that proved the off_trail_base penalty
# was missing.
# ============================================================
[[scenario]]
name = "valnesfjord-trail-end-to-end-3km"
note = "Q1 from the May 2026 audit"
from = [15.454534832286805, 67.43375929693732]
to   = [15.432785205291996, 67.45663077560094]
profile = "foot"

[scenario.assert]
# After Stage 2 calibration the mesh tracks the trail exactly
# (mimicry mean_dev=0 m), so `off_trail` is a valid winner here:
# its polyline overlays the on_graph route. Keep `hybrid` and
# `on_graph` allowed too — they remain the typical choice when
# the trail proximity bias doesn't drag the mesh strategy below
# them in cost.
strategy_in = ["on_graph", "hybrid", "off_trail"]
length_m_min = 2500
length_m_max = 4500
# sti pct is only meaningful for graph strategies; drop the
# threshold when off_trail wins because the fkb_breakdown comes
# out empty in that case.
fkb_breakdown_sti_pct_min = 0

# ============================================================
# Q2 — Cross-country with a real trail option.
# Both endpoints have sti at 0m. The trail is slightly longer
# than crow-flies; the cost model must still prefer it.
# ============================================================
[[scenario]]
name = "valnesfjord-short-1km"
note = "Q2 — fix-target for the TrailProximity bonus regression"
from = [15.384372, 67.39699]
to   = [15.401155, 67.40451]
profile = "foot"

[scenario.assert]
strategy_in = ["on_graph", "hybrid"]
length_m_min = 1000
length_m_max = 1500
fkb_breakdown_sti_pct_min = 90

# ============================================================
# Q3 — Dense trail region, multiple sti options.
# Oslo Marka. The off_trail_base = 1.7 calibration was driven
# by this query needing to flip from straight-line mesh to
# hybrid trail use.
# ============================================================
[[scenario]]
name = "oslo-marka-5km"
note = "Q3 — calibration target for off_trail_base"
from = [10.71, 59.96]
to   = [10.66, 60.00]
profile = "foot"

[scenario.assert]
strategy_in = ["hybrid", "on_graph"]
length_m_min = 5500
length_m_max = 8500
# Should be mostly sti when the calibration is right.
fkb_breakdown_sti_pct_min = 50

# ============================================================
# Q4 — Genuinely off-trail short walk.
# 500m in an area where the available trail is 2.3x longer
# than crow-flies. Off-trail mesh IS the right answer.
# ============================================================
[[scenario]]
name = "sognsvann-500m"
note = "Q4 — when off-trail is genuinely the shorter path"
from = [10.7250, 59.9650]
to   = [10.7180, 59.9690]
profile = "foot"

[scenario.assert]
length_m_min = 500
# After the trail_proximity calibration bump (radius 50→150,
# bonus 0.95→0.5) plus the f64 polygon-intersection fix, the
# mesh now diverts via the actual sti rather than cutting a
# direct line. That's the *desired* behaviour from the trail-
# mimicry test, so the ceiling here loosens to reflect the
# real-trail length (~1.7 km along sti at Sognsvann).
length_m_max = 1900

# ============================================================
# Q5 — Roads-only region.
# Bergen urban edge. No trails nearby; routing should pick vei.
# ============================================================
[[scenario]]
name = "bergen-2km-roads"
note = "Q5 — routing on roads when no trails exist"
from = [5.327, 60.396]
to   = [5.343, 60.387]
profile = "foot"

[scenario.assert]
# The unified router is the sole combined router now; it reports
# `hybrid` (trail + off-trail in one solve) even for an all-roads route.
strategy_in = ["hybrid"]
length_m_min = 1100
length_m_max = 2000
# No sti at all in this query.

# ============================================================
# Q7 — Another trail snap pair.
# Verifies trail-following isn't specific to one region.
# ============================================================
[[scenario]]
name = "valnesfjord-trail-snap-1km"
note = "Q7 — second trail-following case"
from = [15.39, 67.40]
to   = [15.40, 67.41]
profile = "foot"

[scenario.assert]
strategy_in = ["on_graph", "hybrid"]
length_m_min = 1000
length_m_max = 2500
fkb_breakdown_sti_pct_min = 80

# ============================================================
# Trivial / degenerate input.
# Two clicks under the mesh_cell_m floor (default 25m). The
# system must REFUSE with a `from/to too close` error, not silently
# return a nonsense route. This pins the refusal contract.
# ============================================================
[[scenario]]
name = "degenerate-near-same-point"
note = "<4m apart — solver must refuse, not invent a route"
from = [15.384372, 67.39699]
to   = [15.384462, 67.39699]
profile = "foot"

[scenario.assert]
must_fail = true
must_fail_message_includes = "too close"

# ============================================================
# Bicycle profile — exists in API, only audited at the trace
# level. This pins the response shape.
# ============================================================
[[scenario]]
name = "bicycle-on-roads-2km"
note = "Bicycle should prefer vei, not sti"
from = [10.71, 59.96]
to   = [10.69, 59.97]
profile = "bicycle"

[scenario.assert]
# Bicycle profile is rough — broad range. Lock the shape, not
# the exact numbers, until a dedicated bicycle audit runs.
length_m_min = 500
length_m_max = 5000

# ============================================================
# Ski profile.
# ============================================================
[[scenario]]
name = "ski-profile-smoke"
note = "Ski profile — pin response shape only until audit"
from = [10.71, 59.96]
to   = [10.69, 59.97]
profile = "ski"

[scenario.assert]
length_m_min = 500
length_m_max = 5000

# ============================================================
# Mountain crossing — refusal expected.
# Jotunheimen point is on a glacier or steep refused region.
# Must fail honestly with a refusal error, not return a route.
# ============================================================
[[scenario]]
name = "jotunheimen-glacier-refusal"
note = "Q6 — endpoint on glacier"
from = [8.30, 61.50]
to   = [8.45, 61.55]
profile = "foot"

[scenario.assert]
must_fail = true
must_fail_message_includes = "refused"
