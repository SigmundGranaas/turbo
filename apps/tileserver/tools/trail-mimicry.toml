# ----- Phase 7: anisotropic FMM stress cases ---------------------
# Picked specifically to exercise contour-following behaviour. Each
# expects the solver to bend around a slope feature rather than cut
# straight across.

[[scenario]]
name = "skolten-ridge-traverse"
from = [16.0825, 68.3530]
to   = [16.1015, 68.3470]
profile = "foot"
# Crossing the Skolten ridge in Narvik. The straight line goes
# straight up the steepest part of the headwall; a real hiker
# (and our FMM red line in the manual screenshots) detours along
# the contour to the saddle. Tight on length ratio to make sure
# the FMM doesn't take a silly multi-km detour.
mean_deviation_max_m = 200.0
max_deviation_max_m  = 500.0
length_ratio_max     = 1.6
sharp_turns_max      = 1
max_turn_deg_max     = 75.0

[[scenario]]
name = "narvik-rombakstotta-contour"
from = [17.7800, 68.4660]
to   = [17.8050, 68.4720]
profile = "foot"
# East flank of Rombakstøtta. Cliff bands force the route onto a
# specific contour; the legacy Theta\* mode famously routed
# straight up the cliff in the user's screenshots.
mean_deviation_max_m = 250.0
max_deviation_max_m  = 600.0
length_ratio_max     = 1.7
sharp_turns_max      = 1
max_turn_deg_max     = 90.0

[[scenario]]
name = "lofoten-coastal-fjord-detour"
from = [14.0400, 68.2100]
to   = [14.0800, 68.2250]
profile = "foot"
# Steep Lofoten coast — slope and water both penalise the direct
# line. A correct route follows the bench above the water until
# the saddle. Generous deviation budget because the bench may be
# >300 m above the water in places.
mean_deviation_max_m = 350.0
max_deviation_max_m  = 800.0
length_ratio_max     = 1.8
sharp_turns_max      = 1
max_turn_deg_max     = 90.0
