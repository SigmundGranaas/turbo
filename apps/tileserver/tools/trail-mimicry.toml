# Trail-mimicry corpus. Each scenario picks a real trail end-to-end
# (`from`/`to` are WGS84 lon/lat) and defines deviation + shape
# thresholds the off-trail solver must hit when graph snapping is
# disabled. A well-tuned solver should both stay reasonably close to
# the actual hiker-chosen path AND produce a smooth, hiker-natural
# polyline (no 90° turns, no overshoots). Failing either condition
# points at missing terrain inputs (water polygons, wetland, ridges)
# or wrong cost weights / metric choice.
#
# Shape thresholds (new in phase 7):
#   sharp_turns_max  — number of segments where the path bends by
#                      ≥75° at a single vertex. Default 1 (small
#                      kinks happen at the boundary cells); ≥2 is
#                      a "doglegs" failure.
#   max_turn_deg_max — worst single-vertex bend. ≤90° is the bar;
#                      anything sharper means the solver took an
#                      angular cut over terrain it should curve
#                      around.

[[scenario]]
name = "valnesfjord-trail-end-to-end-3km"
from = [15.454534832286805, 67.43375929693732]
to   = [15.432785205291996, 67.45663077560094]
profile = "foot"
# 3 km in mixed coastal terrain. Deviation budget tight because a
# correctly-tuned solver should track the existing trail closely.
mean_deviation_max_m = 150.0
max_deviation_max_m  = 500.0
length_ratio_max     = 1.6
sharp_turns_max      = 1
max_turn_deg_max     = 90.0

