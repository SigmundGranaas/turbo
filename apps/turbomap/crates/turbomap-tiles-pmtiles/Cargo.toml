[package]
name = "turbomap-tiles-pmtiles"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true
description = "PMTiles v3 archive reader. Implements TileSource and VectorTileSource over a single .pmtiles file."

[lints]
workspace = true

[dependencies]
turbomap-core = { path = "../turbomap-core" }
turbomap-mvt = { path = "../turbomap-mvt" }
log.workspace = true
thiserror.workspace = true
flate2 = "1"
# Pure-Rust brotli decode for real-world planet archives (no C dep).
brotli-decompressor = "5"
parking_lot = "0.12"
reqwest.workspace = true

[dev-dependencies]
tempfile = "3"
# Encoder side, tests only — round-trips the brotli decode path.
brotli = "8"
