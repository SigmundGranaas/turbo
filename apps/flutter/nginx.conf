# Static serving for the Flutter web SPA (unprivileged nginx, port 8080).
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/wasm application/manifest+json;

    # index + service worker must never be cached, or clients get stuck on a
    # stale app shell after a deploy.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Hashed/static assets can be cached aggressively.
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|wasm)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # SPA fallback — every unmatched route serves the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
