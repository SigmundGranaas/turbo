# XcodeGen project spec for the Turbo iOS app.
# Regenerate the .xcodeproj with:  xcodegen generate   (run in apps/ios)
#
# The app target is intentionally thin — it links the local Swift package
# (Package.swift) which holds every module. Keeping the project generated from
# this file (rather than committing the .xcodeproj) keeps the wiring reviewable.
name: Turbo
options:
  bundleIdPrefix: no.sandring.turbo
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

packages:
  Turbo:
    path: .

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  Turbo:
    type: application
    platform: iOS
    sources:
      - path: App
    dependencies:
      - package: Turbo
        product: TurboApp
      - target: RecordingWidget
        embed: true
    info:
      path: App/Info.generated.plist
      properties:
        CFBundleDisplayName: Turbo
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        NSLocationWhenInUseUsageDescription: "Turbo uses your location to show where you are on the map and follow you on the trail."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Turbo keeps recording your track when the app is in the background or your screen is locked."
        # Keep GPS alive while recording a track with the app backgrounded.
        UIBackgroundModes: [location]
        # Live Activity (Dynamic Island / Lock Screen) for the active recording.
        NSSupportsLiveActivities: true
        # Set to the API base URL (e.g. https://kart.sandring.no/api) to go online.
        TurboAPIBaseURL: ""
        # OAuth callback scheme for Google sign-in (turbo://oauth?code=…).
        CFBundleURLTypes:
          - CFBundleURLName: no.sandring.turbo
            CFBundleURLSchemes: [turbo]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: no.sandring.turbo
        PRODUCT_NAME: Turbo
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"

  RecordingWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: RecordingWidget
    dependencies:
      - package: Turbo
        product: CoreLiveActivity
    info:
      path: RecordingWidget/Info.generated.plist
      properties:
        CFBundleDisplayName: Turbo Recording
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: no.sandring.turbo.RecordingWidget
        PRODUCT_NAME: RecordingWidget
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: YES

  TurboUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    dependencies:
      - target: Turbo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: no.sandring.turbo.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Turbo

schemes:
  Turbo:
    build:
      targets:
        Turbo: all
        TurboUITests: [test]
    test:
      targets:
        - TurboUITests
    run:
      config: Debug
