# Static serving for the Turbo web SPA (unprivileged nginx, port 8080). Mirrors
# the old Flutter image's config so the k8s contract is unchanged — just a Vite
# bundle (incl. the turbomap WASM) instead of a Flutter one, and no service
# worker (online-first; added in the offline/PWA phase).
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/wasm application/manifest+json;

    # The app shell must never be cached, or clients stay on a stale build.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Vite fingerprints asset filenames → cache aggressively (incl. the large
    # turbomap .wasm; nginx 1.27 serves it as application/wasm out of the box).
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|wasm)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # SPA fallback — every unmatched route serves the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
